<div class="app-shell" x-data="tiAppShell" x-bind:class="{ collapsed: collapsed }">
    <nav class="sidebar" aria-label="Main navigation">
        <button class="sidebar-collapse-btn" @click="toggleCollapse()" x-bind:aria-label="collapsed ? 'Expand sidebar' : 'Collapse sidebar'" type="button">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                <path d="M6.5 2L3.5 5L6.5 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Brand slot — override in app-specific frame -->
        <div class="sidebar-brand">
            <div class="sidebar-brand-mark">T</div>
            <div class="sidebar-brand-text-block">
                <span class="sidebar-brand-text">ti-engine</span>
            </div>
        </div>

        <!-- Navigation slot — override in app-specific frame -->
        <div class="sidebar-nav">
            <a href="/" class="sidebar-item" data-tip="Dashboard" aria-label="Dashboard">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <path d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
                    </svg>
                </span>
                <span class="sidebar-item-label">Dashboard</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="sidebar-foot">
            <button class="sidebar-item" @click="toggleTheme()" data-tip="Toggle theme" aria-label="Toggle theme" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 3v1m0 16v1m8.66-13-1 .58M4.34 16.42l-1 .58M21 12h-1M4 12H3m15.66 7.42-1-.58M5.34 6.58l-1-.58"/>
                        <circle cx="12" cy="12" r="4"/>
                    </svg>
                </span>
                <span class="sidebar-item-label" x-text="theme === 'daylight' ? 'Glass Theme' : 'Daylight Theme'">Toggle Theme</span>
            </button>
        </div>
    </nav>

    <div class="content" id="ti-content-wrapper">
        <div id="ti-content" class="page-scrollable">
            <ti-nested-frame-placeholder hx-get="/app/dashboard" hx-trigger="load" hx-target="this" hx-swap="outerHTML" hx-push-url="true"/>
        </div>
    </div>

    <!-- Toast notification stack -->
    <div id="ti-notifications" x-data="tiComponentNotificationBar" class="toast-stack" aria-live="polite" aria-atomic="false">
        <template x-for="n in notifications" x-bind:key="n.id">
            <div class="toast" x-bind:class="n.tone || 'info'" role="alert">
                <div class="toast-icon" aria-hidden="true">
                    <span x-text="n.tone === 'success' ? '✓' : n.tone === 'danger' ? '✕' : n.tone === 'warn' ? '!' : 'i'"></span>
                </div>
                <div class="toast-body">
                    <div class="toast-title" x-text="n.title || ''"></div>
                    <div class="toast-desc" x-text="n.message || ''"></div>
                </div>
                <button class="toast-close" @click="remove(n.id)" aria-label="Dismiss notification" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </template>
    </div>
</div>
