<div id="ti-topbar-info">
    <div class="ti-topbar-title" x-text="screenTitle"></div>
    <div class="ti-topbar-sub"
         x-text="($store.tiApplication.configuration && $store.tiApplication.configuration.cycle && $store.tiApplication.configuration.cycle.name) || ''"></div>
</div>
<div class="ti-topbar-spacer"></div>
<div class="ti-topbar-actions">
    <button class="ti-btn icon ghost" type="button" x-text-label:aria-label="interface.topbar.search" aria-label="Search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
    </button>
    <button class="ti-btn icon ghost" type="button" x-text-label:aria-label="interface.topbar.notifications" aria-label="Notifications">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round" aria-hidden="true">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
    </button>
</div>
