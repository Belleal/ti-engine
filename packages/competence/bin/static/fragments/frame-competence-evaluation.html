<title id="ti-page-title" hx-swap-oob="outerHTML">{ti-title-placeholder}</title>
<div class="ti-content pane" x-data="competencyEvaluation()">
    <div class="ti-panel ti-sub-panel">
        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.personal.title"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.personal.name"></div>
            <div class="ti-data-value" x-text="personal.name"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.career-path"></div>
            <div class="competence-grid-value-group level">
                <div class="ti-data-value compact-centered" x-text="personal.level + personal.stage"></div>
                <div class="ti-data-value" x-text="personal.positionName"></div>
            </div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.organization-unit-id"></div>
            <div class="ti-data-value" x-text="personal.organizationUnitName"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.manager"></div>
            <div class="ti-data-value" x-text="manager.name"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.starting-date"></div>
            <div class="ti-data-value" x-text="formatDate( personal.startingDate )"></div>
        </div>
    </div>

    <div x-show="showEvaluationForm && (userRole === 1 || userRole === 2 || userRole === 4) && canEdit" class="ti-button-bar ti-sub-panel">
        <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                x-on:click="resetGrades()"
                x-text-label="interface.evaluation.actions.reset"></button>
        <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                x-show="( userRole === 1 || userRole === 2 ) && canEdit"
                x-on:click="saveDraft()"
                x-text-label="interface.evaluation.actions.save-draft"></button>
        <button type="button" class="ti-button ti-glass-btn-black large on-screen primary"
                x-on:click="submitEvaluation()"
                x-text-label="interface.evaluation.actions.submit"></button>
    </div>

    <div x-show="showEvaluationForm" class="ti-panel ti-sub-panel">
        <div class="role-banner" x-bind:class="getUserRoleAsText()" x-show="userRole">
            <div class="role-banner-text">
                <span x-show="userRole === 1" x-text-label="interface.evaluation.banners.employee"></span>
                <span x-show="userRole === 2" x-text-label="interface.evaluation.banners.manager"></span>
                <span x-show="userRole === 4" x-text-label="interface.evaluation.banners.team"></span>
            </div>
        </div>

        <span class="ti-spacer-v-10"></span>

        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.appraisal.title"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.cycle"></div>
            <div class="competence-grid-value-group appraisal-cycle">
                <div class="ti-data-value compact-centered" x-text="evaluation.cycleID"></div>
                <div class="ti-data-value" x-text="formatDate( evaluation.cycleDate )"></div>
            </div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.interview-date"></div>
            <div class="ti-data-value" x-text="formatDate( personal.interviewDate, 'interface.evaluation.appraisal.interview-date-not-set' )"></div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.submission-deadline"></div>
            <div class="ti-data-value" x-text="formatDate( deadlineDate, 'interface.evaluation.appraisal.submission-deadline-not-set' )"></div>
        </div>

        <span class="ti-spacer-v-10"></span>

        <div class="competence-list">
            <div class="competence-list-head">
                <div class="competence-list-head-label title" x-text-label="interface.evaluation.competencies.title"></div>
                <div class="competence-list-head-label appraisals" x-text-label="interface.evaluation.competencies.appraisals"></div>
                <div class="competence-list-head-label self" x-text-label="interface.evaluation.competencies.self"></div>
                <div class="competence-list-head-label manager" x-text-label="interface.evaluation.competencies.manager"></div>
                <div class="competence-list-head-label team" x-text-label="interface.evaluation.competencies.team"></div>
            </div>

            <template x-for="category in competencies" x-bind:key="category.id">
                <div class="competence-category">
                    <div class="competence-category-header">
                        <div class="competence-category-name" x-text="category.name"></div>
                        <div class="competence-category-description" x-text="category.description"></div>
                    </div>
                    <template x-for="sub in category.subcategories" x-bind:key="sub.id">
                        <div class="competence-subcategory">
                            <div class="competence-subcategory-title" x-text="sub.name"></div>
                            <template x-for="item in sub.items" x-bind:key="item.id">
                                <div class="competence-row">
                                    <div class="competence-info">
                                        <div class="competence-code" x-text="item.id"></div>
                                        <div class="competence-name" x-text="item.name"></div>
                                    </div>
                                    <!-- Self Grade Column -->
                                    <select x-bind:name="'grade-employee-' + item.id" class="ti-input grade"
                                            x-bind:aria-label="'Self grade for ' + item.id + ' ' + item.name"
                                            x-on:change="setItemGrade( item.id, 'employee', $event.target.value )"
                                            x-bind:data-ti-tooltip="item.description"
                                            x-show="userRole === 1 && canEdit">
                                        <option value="" x-bind:selected="!getItemGrade( item.id, 'employee' )">-</option>
                                        <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade( item.id, 'employee' ) == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="ti-data-value compact-centered" x-text="getItemGrade( item.id, 'employee', '-' )"
                                         x-show="userRole === 2 || ( userRole === 1 && !canEdit )"></div>
                                    <div class="material-symbols-outlined ti-data-value compact-centered"
                                         x-show="userRole === 4"
                                         aria-label="Locked" role="img">lock_person
                                    </div>

                                    <!-- Manager Grade Column -->
                                    <select x-bind:name="'grade-manager-' + item.id" class="ti-input grade"
                                            x-bind:aria-label="'Manager grade for ' + item.id + ' ' + item.name"
                                            x-on:change="setItemGrade( item.id, 'manager', $event.target.value )"
                                            x-show="userRole === 2 && canEdit">
                                        <option value="" x-bind:selected="!getItemGrade( item.id, 'manager' )">-</option>
                                        <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade( item.id, 'manager' ) == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="ti-data-value compact-centered" x-text="getItemGrade( item.id, 'manager', '-' )"
                                         x-show="userRole === 2 && !canEdit"></div>
                                    <div class="material-symbols-outlined ti-data-value compact-centered"
                                         x-show="userRole === 1 || userRole === 4"
                                         aria-label="Locked" role="img">lock_person
                                    </div>

                                    <!-- Team Grade Column -->
                                    <select x-bind:name="'grade-team-' + item.id" class="ti-input grade"
                                            x-bind:aria-label="'Team grade for ' + item.id + ' ' + item.name"
                                            x-on:change="setItemGrade( item.id, 'team', $event.target.value )"
                                            x-show="userRole === 4 && canEdit">
                                        <option value="" x-bind:selected="!getItemGrade( item.id, 'team' )">-</option>
                                        <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade( item.id, 'team' ) == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="ti-data-value compact-centered" x-text="getItemGrade( item.id, 'team', '-' )"
                                         x-show="userRole === 2 || ( userRole === 4 && !canEdit )"></div>
                                    <div class="material-symbols-outlined ti-data-value compact-centered"
                                         x-show="userRole === 1"
                                         aria-label="Locked" role="img">lock_person
                                    </div>

                                    <div class="competence-item-description" x-text="item.description"></div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</div>
