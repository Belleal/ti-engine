<div class="ti-page" x-data="competenceEvaluation">

    <template x-if="noEvaluationState === 'none'">
        <div class="ti-panel">
            <div class="ti-empty-state">
                <div class="ti-empty-state-icon" aria-hidden="true">
                    <span class="ti-icon check-clipboard xl"></span>
                </div>
                <div class="ti-empty-state-title" x-text-label="interface.evaluation.messages.no-evaluation-title"></div>
                <div class="ti-empty-state-desc" x-text-label="interface.evaluation.messages.no-evaluation-desc"></div>
            </div>
        </div>
    </template>

    <template x-if="showEvaluationForm">
        <div>
            <!-- Page header: cycle eyebrow + role-specific H1 + description -->
            <div class="ti-page-head">
                <div class="ti-page-eyebrow" x-text="evaluation.shortID"></div>
                <h1 class="ti-page-title" x-text="getLabel( getPageTitle() )"></h1>
                <p class="ti-page-subtitle" x-text="getLabel( getPageDesc() )"></p>
            </div>

            <!-- Role info panel -->
            <div class="competence-eval-role-info" x-bind:class="getUserRoleAsText()">
                <div class="competence-eval-role-info-title" x-text="getLabel( getRolePanelTitle() )"></div>
                <div class="competence-eval-role-info-desc" x-text="getLabel( getRolePanelDesc() )"></div>
            </div>

            <!-- Top grid: employee card (left) · right column (deadline + team reviewers stacked) -->
            <div class="competence-eval-top-grid">

                <!-- Employee info block -->
                <div class="competence-eval-employee-card">
                    <!-- Top row: avatar+info (left) + status pill (right) -->
                    <div class="competence-eval-emp-top-row">
                        <div class="competence-eval-emp-avatar-block">
                            <div class="ti-avatar xl" x-bind:style="$store.tiToolbox.generateAvatarStyle( personal.id, personal.name )"
                                 x-bind:aria-label="personal.name">
                                <span x-text="( personal.name || '?' ).charAt( 0 ).toUpperCase()"></span>
                            </div>
                            <div class="competence-eval-emp-info">
                                <div class="competence-eval-emp-name" x-text="personal.name"></div>
                                <div class="competence-eval-context">
                                    <div class="competence-eval-context-item">
                                        <div class="competence-eval-context-label" x-text-label="interface.evaluation.context.role-family"></div>
                                        <div class="competence-eval-context-value" x-text="personal.roleFamilyName || '—'"></div>
                                    </div>
                                    <div class="competence-eval-context-item">
                                        <div class="competence-eval-context-label" x-text-label="interface.evaluation.context.specialization"></div>
                                        <div class="competence-eval-context-value"
                                             x-bind:class="personal.specializationName ? '' : 'is-generalist'"
                                             x-text="personal.specializationName || getLabel( 'interface.evaluation.context.generalist' )"></div>
                                    </div>
                                    <div class="competence-eval-context-item">
                                        <div class="competence-eval-context-label" x-text-label="interface.evaluation.context.stage-level"></div>
                                        <div class="competence-eval-context-value">
                                            <span class="competence-level-pip"
                                                  x-show="personal.stageLevel"
                                                  x-bind:class="personal.stageLevel ? personal.stageLevel.charAt( 0 ) : ''"
                                                  x-text="personal.stageLevel"></span>
                                            <span x-show="!personal.stageLevel">—</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="competence-eval-emp-career">
                                    <span x-text="personal.organizationUnitName"></span>
                                    <span class="competence-eval-sub-sep" x-show="personal.startingDate">·</span>
                                    <span x-show="personal.startingDate"
                                          x-text="getLabel( 'interface.evaluation.personal.joined' ) + ' ' + formatDate( personal.startingDate, '' )"></span>
                                </div>
                                <div class="competence-eval-emp-meta">
                                    <span x-text-label="interface.evaluation.personal.manager"></span>
                                    <span x-text="manager.name"></span>
                                </div>
                            </div>
                        </div>
                        <div class="competence-eval-emp-status-pill">
                            <span class="ti-status-pill" x-bind:class="getStatusPillTone()">
                                <span class="dot"></span>
                                <span x-text="getLabel(evaluation.statusName)"></span>
                            </span>
                        </div>
                    </div>
                    <!-- Status milestone track -->
                    <div class="state-track">
                        <div class="state-step" x-bind:class="getStepClass(0)">
                            <span class="marker"></span>
                            <span x-text="getEvalStatusSteps()[0]"></span>
                        </div>
                        <span class="state-step-line" x-bind:class="getLineClass(0)"></span>
                        <div class="state-step" x-bind:class="getStepClass(1)">
                            <span class="marker"></span>
                            <span x-text="getEvalStatusSteps()[1]"></span>
                        </div>
                        <span class="state-step-line" x-bind:class="getLineClass(1)"></span>
                        <div class="state-step" x-bind:class="getStepClass(2)">
                            <span class="marker"></span>
                            <span x-text="getEvalStatusSteps()[2]"></span>
                        </div>
                        <span class="state-step-line" x-bind:class="getLineClass(2)"></span>
                        <div class="state-step" x-bind:class="getStepClass(3)">
                            <span class="marker"></span>
                            <span x-text="getEvalStatusSteps()[3]"></span>
                        </div>
                    </div>
                    <!-- Warning -->
                    <div class="competence-eval-emp-warn" x-show="warningMessage">
                        <span class="ti-icon warning-triangle sm" aria-hidden="true"></span>
                        <span x-text="getLabel(warningMessage)"></span>
                    </div>
                    <!-- Supervisor facilitator notice (read-only; see design 3.8) -->
                    <div class="competence-eval-emp-warn" x-show="isFacilitator">
                        <span class="ti-icon eye sm" aria-hidden="true"></span>
                        <span x-text-label="interface.evaluation.facilitator-notice"></span>
                    </div>
                </div>

                <!-- Right column: deadline card + team reviewers stacked vertically -->
                <div class="competence-eval-top-right-col">

                    <!-- Contextual deadline / interview date card -->
                    <div class="competence-deadline-card">
                        <div class="competence-deadline-card-icon" x-bind:class="evaluation.status === 'Ready' ? 'info' : ''">
                            <span class="ti-icon calendar-blank md" aria-hidden="true" x-show="evaluation.status !== 'Ready'"></span>
                            <span class="ti-icon clock md" aria-hidden="true" x-show="evaluation.status === 'Ready'"></span>
                        </div>
                        <div>
                            <div class="competence-deadline-card-label" x-text="getLabel(getDeadlineLabel())"></div>
                            <div class="competence-deadline-card-value"
                                 x-text="formatDate(getContextualDeadline(), getContextualDeadlinePlaceholder())"></div>
                            <div class="competence-deadline-card-sub" x-show="getDaysLeft(getContextualDeadline()) !== null">
                                <span x-text="getDaysLeft(getContextualDeadline())"></span>
                                <span x-text-label="interface.evaluation.appraisal.days-left"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Team reviewers card -->
                    <div class="competence-team-reviewers-card" x-show="teamReviewers && teamReviewers.total > 0">
                        <div class="competence-deadline-card-icon team">
                            <span class="ti-icon users md" aria-hidden="true"></span>
                        </div>
                        <div>
                            <div class="competence-deadline-card-label" x-text-label="interface.evaluation.team-reviewers-label"></div>
                            <div class="competence-deadline-card-value">
                                <span x-text="(teamReviewers ? teamReviewers.submitted : 0) + '/' + (teamReviewers ? teamReviewers.total : 0)"></span>
                            </div>
                            <div class="competence-deadline-card-sub">
                                <span x-text-label="interface.evaluation.team-feedback-given"></span>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

            <!-- Individual results (READY/CLOSED) — above the demoted grading tables -->
            <div class="ti-panel competence-panel-body competence-panel-mb" x-show="hasResults()">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.evaluation.results.title">Your results</div>
                    <span class="ti-panel-head-aside" x-text-label="interface.evaluation.results.desc"></span>
                </div>
                <div class="ti-card-grid">
                    <section class="ti-card">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.final-score">Final score</h2>
                        <figure class="ti-chart" x-ti-chart="resultsHeroSpec" role="img" x-bind:aria-label="getResultsHeroAriaLabel()"></figure>
                    </section>
                    <section class="ti-card">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.by-category">By category</h2>
                        <figure class="ti-chart" x-ti-chart="resultsCategoryBarsSpec" role="img" x-bind:aria-label="getResultsCategoryAriaLabel()"></figure>
                    </section>
                    <section class="ti-card ti-card-wide">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.profile">Subcategory profile</h2>
                        <figure class="ti-chart" x-ti-chart="resultsRadarSpec" role="img" x-bind:aria-label="getResultsRadarAriaLabel()"></figure>
                    </section>
                    <section class="ti-card ti-card-wide">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.source-comparison">Self vs manager vs team</h2>
                        <figure class="ti-chart" x-ti-chart="resultsSourceBarsSpec" role="img" x-bind:aria-label="getResultsSourceAriaLabel()"></figure>
                    </section>
                    <section class="ti-card">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.strengths">Strengths</h2>
                        <div class="ti-data-grid">
                            <template x-for="s in resultsStrengths" x-bind:key="s.code">
                                <div class="ti-data-grid-row">
                                    <span class="ti-data-grid-cell" x-text="s.label"></span>
                                    <span class="ti-kv-value tabular-nums" x-text="s.value"></span>
                                </div>
                            </template>
                            <div class="competence-eval-empty-comment" x-show="resultsStrengths.length === 0" x-text-label="interface.evaluation.results.none">—</div>
                        </div>
                    </section>
                    <section class="ti-card">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.gaps">Development areas</h2>
                        <div class="ti-data-grid">
                            <template x-for="g in resultsGaps" x-bind:key="g.code">
                                <div class="ti-data-grid-row">
                                    <span class="ti-data-grid-cell" x-text="g.label"></span>
                                    <span class="ti-kv-value tabular-nums" x-text="g.gap"></span>
                                </div>
                            </template>
                            <div class="competence-eval-empty-comment" x-show="resultsGaps.length === 0" x-text-label="interface.evaluation.results.none">—</div>
                        </div>
                    </section>
                    <!-- CA-X4 — the employee's own score history across cycles (My results only; needs ≥2 reported cycles) -->
                    <section class="ti-card ti-card-wide" x-show="hasHistory()">
                        <h2 class="ti-card-title" x-text-label="interface.evaluation.results.history-title">Score history</h2>
                        <p class="ti-panel-body-intro" x-text-label="interface.evaluation.results.history-desc"></p>
                        <figure class="ti-chart" x-ti-chart="resultsHistorySpec" role="img" x-bind:aria-label="getResultsHistoryAriaLabel()"></figure>
                    </section>
                </div>
            </div>

            <!-- How to grade cards -->
            <div class="ti-panel competence-panel-body competence-panel-mb">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.evaluation.instructions.title"></div>
                    <span class="ti-panel-head-aside" x-text="getGradeScaleLabel()"></span>
                </div>
                <div class="ti-panel-body-intro" x-text-label="interface.evaluation.instructions.grades"></div>
                <div class="ti-panel-body-intro" x-show="userRole === 4" x-text-label="interface.evaluation.instructions.team-grading"></div>
                <div class="competence-eval-grade-guide-grid">
                    <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                        <div class="competence-eval-grade-card" x-bind:title="grade.description">
                            <span class="ti-grade-chip" x-bind:data-grade="gradeKey" x-text="gradeKey"></span>
                            <div class="competence-eval-grade-card-info">
                                <div class="competence-eval-grade-card-name" x-text="grade.name"></div>
                                <div class="competence-eval-grade-card-short" x-text="getGradeShortDesc(gradeKey)"></div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Competency categories -->
            <template x-for="category in competencies" x-bind:key="category.id">
                <div class="competence-cat-card" x-bind:class="category.id ? category.id.charAt(0) : ''">
                    <div class="competence-cat-card-head">
                        <div class="competence-cat-letter" x-text="category.id ? category.id.charAt(0) : '?'"></div>
                        <div>
                            <div class="competence-cat-card-name" x-text="category.name"></div>
                            <div class="competence-cat-card-desc" x-show="category.description" x-text="category.description"></div>
                        </div>
                        <div class="competence-cat-progress-mini" x-show="userRole !== 4">
                            <span class="competence-cat-progress-mini-text">
                                <span x-text="getCategoryGradedCount(category.id)"></span>/<span x-text="getCategoryTotalCount(category.id)"></span>
                            </span>
                            <div class="competence-cat-progress-mini-bar" x-bind:style="{ '--pct': getCategoryGradedPct(category.id) + '%' }">
                                <div class="competence-fill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Table header -->
                    <div class="competence-comp-table-head">
                        <span x-text-label="interface.evaluation.competencies.title"></span>
                        <span class="competence-h-self"
                              x-bind:class="userRole === 1 ? 'active' : ''"
                              x-text-label="interface.evaluation.competencies.self"></span>
                        <span class="competence-h-mgr"
                              x-bind:class="userRole === 2 ? 'active' : ''"
                              x-text-label="interface.evaluation.competencies.manager"></span>
                        <span class="competence-h-team"
                              x-bind:class="userRole === 4 ? 'active' : ''"
                              x-text-label="interface.evaluation.competencies.team"></span>
                    </div>

                    <template x-for="sub in category.subcategories" x-bind:key="sub.id">
                        <div class="competence-subcat-block">
                            <div class="competence-subcat-head">
                                <span class="competence-subcat-id" x-text="sub.id"></span>
                                <div class="competence-subcat-name-block">
                                    <span class="competence-subcat-name" x-text="sub.name"></span>
                                    <span class="competence-subcat-desc" x-show="sub.description" x-text="sub.description"></span>
                                </div>
                            </div>

                            <!-- Collective subcategory row (team collective view) -->
                            <div class="competence-comp-row" x-show="userRole === 4 && isTeamEvaluationCollective">
                                <div class="competence-comp-info">
                                    <div class="competence-comp-id-name">
                                        <span class="competence-comp-id" x-text="sub.id"></span>
                                        <span class="competence-comp-name" x-text="sub.name"></span>
                                    </div>
                                </div>
                                <!-- Self — hidden from team reviewers (does not apply at sub-category level): show a lock -->
                                <div class="competence-comp-cell">
                                    <span class="ti-grade-chip locked" x-bind:aria-label="getLabel('interface.evaluation.grade-hidden-aria')">
                                        <span class="ti-icon lock xs" aria-hidden="true"></span>
                                    </span>
                                </div>
                                <!-- Manager — hidden from team reviewers (does not apply at sub-category level): show a lock -->
                                <div class="competence-comp-cell">
                                    <span class="ti-grade-chip locked" x-bind:aria-label="getLabel('interface.evaluation.grade-hidden-aria')">
                                        <span class="ti-icon lock xs" aria-hidden="true"></span>
                                    </span>
                                </div>
                                <!-- Team grade (editable pills or read-only chip) -->
                                <div class="competence-comp-cell">
                                    <div class="competence-grade-pill-group" x-show="canEdit">
                                        <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                                            <span class="ti-grade-chip"
                                                  x-bind:data-grade="gradeKey"
                                                  x-bind:class="getGradeChipClass(sub.id, 'team', gradeKey)"
                                                  x-bind:aria-label="'Team grade for ' + sub.id + ': ' + gradeKey"
                                                  x-text="gradeKey"
                                                  @click="toggleGrade(sub.id, 'team', gradeKey)"></span>
                                        </template>
                                    </div>
                                    <span class="ti-grade-chip"
                                          x-bind:data-grade="getItemGrade(sub.id, 'team')"
                                          x-bind:class="getItemGrade(sub.id, 'team') ? '' : 'empty'"
                                          x-text="getItemGrade(sub.id, 'team')"
                                          x-show="!canEdit"></span>
                                </div>
                            </div>

                            <!-- Individual competency rows -->
                            <template x-for="item in sub.items" x-bind:key="item.id">
                                <div class="competence-comp-row" x-show="userRole !== 4 || !isTeamEvaluationCollective">
                                    <div class="competence-comp-info">
                                        <div class="competence-comp-id-name">
                                            <span class="competence-comp-id" x-text="item.id"></span>
                                            <span class="competence-comp-name" x-text="item.name"></span>
                                            <span class="competence-comp-origin"
                                                  x-show="item.originName"
                                                  x-text="item.originName"></span>
                                            <template x-for="( mapping, mIdx ) in (item.eCFMapping || [])" x-bind:key="mIdx">
                                                <span class="competence-comp-ecf">
                                                    <span x-text-label="interface.evaluation.context.ecf-prefix"></span>:
                                                    <span x-text="mapping.competence + ' (' + mapping.level + ')'"></span>
                                                </span>
                                            </template>
                                        </div>
                                        <div class="competence-comp-desc" x-text="item.description"></div>
                                    </div>

                                    <!-- Self-grade cell -->
                                    <div class="competence-comp-cell">
                                        <!-- Editable: self (role=1) -->
                                        <div class="competence-grade-pill-group" x-show="userRole === 1 && canEdit">
                                            <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                                                <span class="ti-grade-chip"
                                                      x-bind:data-grade="gradeKey"
                                                      x-bind:class="getGradeChipClass(item.id, 'employee', gradeKey)"
                                                      x-bind:aria-label="'Self grade for ' + item.id + ': ' + gradeKey"
                                                      x-text="gradeKey"
                                                      @click="toggleGrade(item.id, 'employee', gradeKey)"></span>
                                            </template>
                                        </div>
                                        <!-- Read-only own: employee when not editing, or manager viewing -->
                                        <span class="ti-grade-chip"
                                              x-bind:data-grade="getItemGrade(item.id, 'employee')"
                                              x-bind:class="getItemGrade(item.id, 'employee') ? '' : 'empty'"
                                              x-text="getItemGrade(item.id, 'employee')"
                                              x-show="(userRole === 1 && !canEdit) || userRole === 2"></span>
                                        <!-- Hidden from team reviewers (stripped server-side): show a lock, never a value or progress -->
                                        <span class="ti-grade-chip locked" x-show="userRole === 4"
                                              x-bind:aria-label="getLabel('interface.evaluation.grade-hidden-aria')">
                                            <span class="ti-icon lock xs" aria-hidden="true"></span>
                                        </span>
                                    </div>

                                    <!-- Manager-grade cell -->
                                    <div class="competence-comp-cell">
                                        <!-- Editable: manager (role=2) -->
                                        <div class="competence-grade-pill-group" x-show="userRole === 2 && canEdit">
                                            <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                                                <span class="ti-grade-chip"
                                                      x-bind:data-grade="gradeKey"
                                                      x-bind:class="getGradeChipClass(item.id, 'manager', gradeKey)"
                                                      x-bind:aria-label="'Manager grade for ' + item.id + ': ' + gradeKey"
                                                      x-text="gradeKey"
                                                      @click="toggleGrade(item.id, 'manager', gradeKey)"></span>
                                            </template>
                                        </div>
                                        <!-- Read-only value: manager not editing, or the employee once results are Ready -->
                                        <span class="ti-grade-chip"
                                              x-bind:data-grade="getItemGrade(item.id, 'manager')"
                                              x-bind:class="getItemGrade(item.id, 'manager') ? '' : 'empty'"
                                              x-text="getItemGrade(item.id, 'manager')"
                                              x-show="(userRole === 2 && !canEdit) || (userRole === 1 && evaluation.status === 'Ready')"></span>
                                        <!-- Hidden: team reviewers always; the employee until results are Ready (stripped server-side) -->
                                        <span class="ti-grade-chip locked" x-show="userRole === 4 || (userRole === 1 && evaluation.status !== 'Ready')"
                                              x-bind:aria-label="getLabel('interface.evaluation.grade-hidden-aria')">
                                            <span class="ti-icon lock xs" aria-hidden="true"></span>
                                        </span>
                                    </div>

                                    <!-- Team-grade cell -->
                                    <div class="competence-comp-cell">
                                        <!-- Editable: team reviewer (role=4) -->
                                        <div class="competence-grade-pill-group" x-show="userRole === 4 && canEdit">
                                            <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                                                <span class="ti-grade-chip"
                                                      x-bind:data-grade="gradeKey"
                                                      x-bind:class="getGradeChipClass(item.id, 'team', gradeKey)"
                                                      x-bind:aria-label="'Team grade for ' + item.id + ': ' + gradeKey"
                                                      x-text="gradeKey"
                                                      @click="toggleGrade(item.id, 'team', gradeKey)"></span>
                                            </template>
                                        </div>
                                        <!-- Read-only value: team reviewer not editing, manager viewing, or the employee once Ready -->
                                        <span class="ti-grade-chip"
                                              x-bind:data-grade="getItemGrade(item.id, 'team')"
                                              x-bind:class="getItemGrade(item.id, 'team') ? '' : 'empty'"
                                              x-text="getItemGrade(item.id, 'team')"
                                              x-show="(userRole === 4 && !canEdit) || userRole === 2 || (userRole === 1 && evaluation.status === 'Ready')"></span>
                                        <!-- Hidden from the employee until results are Ready (stripped server-side): show a lock -->
                                        <span class="ti-grade-chip locked" x-show="userRole === 1 && evaluation.status !== 'Ready'"
                                              x-bind:aria-label="getLabel('interface.evaluation.grade-hidden-aria')">
                                            <span class="ti-icon lock xs" aria-hidden="true"></span>
                                        </span>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Feedback section -->
            <div class="ti-panel competence-panel-body competence-panel-mt" x-show="userRole === 1 || userRole === 2 || ( userRole === 4 && canEdit )">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.evaluation.appraisal.feedback-title"></div>
                    <span class="ti-panel-head-aside" x-text-label="interface.evaluation.appraisal.feedback-desc"></span>
                </div>
                <div class="competence-eval-feedback-body">

                    <!-- Two-column grid: self-reflection + manager (employee and manager only) -->
                    <div class="competence-eval-feedback-grid" x-show="userRole === 1 || userRole === 2">

                        <!-- Employee (self-reflection) column -->
                        <div class="competence-eval-feedback-col">
                            <div class="competence-eval-feedback-col-label" x-text-label="interface.evaluation.appraisal.employee-comment"></div>
                            <textarea id="employeeFeedbackText" name="employeeFeedbackText" class="ti-textarea" rows="4"
                                      x-bind:value="getFeedbackComment( 'employee' )"
                                      @ti-input="setFeedbackComment( 'employee', $event.target.value )"
                                      x-show="userRole === 1 && canEdit"></textarea>
                            <div class="competence-eval-feedback-value"
                                 x-bind:class="getFeedbackComment( 'employee' ) === getLabel( 'interface.evaluation.default.not-provided' ) ? 'empty' : ''"
                                 x-text="getFeedbackComment( 'employee' ) || getLabel( 'interface.evaluation.default.not-provided' )"
                                 x-show="userRole === 2 || ( userRole === 1 && !canEdit )"></div>
                        </div>

                        <!-- Manager comment column -->
                        <div class="competence-eval-feedback-col">
                            <div class="competence-eval-feedback-col-label" x-text-label="interface.evaluation.appraisal.manager-comment"></div>
                            <textarea id="managerFeedbackText" name="managerFeedbackText" class="ti-textarea" rows="4"
                                      x-bind:value="getFeedbackComment( 'manager' )"
                                      @ti-input="setFeedbackComment( 'manager', $event.target.value )"
                                      x-show="userRole === 2 && canEdit"></textarea>
                            <div class="competence-eval-feedback-value"
                                 x-bind:class="getFeedbackComment( 'manager' ) === getLabel( 'interface.evaluation.default.not-provided' ) ? 'empty' : ''"
                                 x-text="getFeedbackComment( 'manager' ) || getLabel( 'interface.evaluation.appraisal.manager-comment-placeholder' )"
                                 x-show="userRole === 1"></div>
                            <div class="competence-eval-feedback-value"
                                 x-bind:class="getFeedbackComment( 'manager' ) === getLabel( 'interface.evaluation.default.not-provided' ) ? 'empty' : ''"
                                 x-text="getFeedbackComment( 'manager' ) || getLabel( 'interface.evaluation.default.not-provided' )"
                                 x-show="userRole === 2 && !canEdit"></div>
                        </div>
                    </div>

                    <!-- Team comment input (team reviewer during open phase) -->
                    <div x-show="userRole === 4 && canEdit">
                        <label for="teamFeedbackText" class="ti-field-label" x-text-label="interface.evaluation.appraisal.team-comment"></label>
                        <textarea id="teamFeedbackText" name="teamFeedbackText" class="ti-textarea" rows="4"
                                  @ti-input="setFeedbackComment( 'team', $event.target.value )"></textarea>
                    </div>

                    <!-- Team comments list (manager always; the employee once results are final — Ready or Closed — anonymous,
                         peer individual grades are already collapsed server-side, so this is privacy-safe) -->
                    <div x-show="userRole === 2 || ( userRole === 1 && ( evaluation.status === 'Ready' || evaluation.status === 'Closed' ) )">
                        <div class="competence-eval-feedback-col-label" x-text-label="interface.evaluation.appraisal.team-comment"></div>
                        <div class="competence-eval-team-comments">
                            <template x-for="( comment, index ) in getFeedbackComment( 'team' )" x-bind:key="index">
                                <div class="competence-eval-team-comment-item"
                                     x-text="comment || getLabel( 'interface.evaluation.default.not-provided' )"></div>
                            </template>
                            <template x-if="getFeedbackComment( 'team' ).length === 0">
                                <div class="competence-eval-empty-comment" x-text-label="interface.evaluation.default.not-provided"></div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sticky action bar -->
            <div class="competence-eval-sticky-bar" x-show="( userRole === 1 || userRole === 2 || userRole === 4 ) && canEdit">
                <div class="competence-eval-sticky-label">
                    <strong x-text="getGradedCount()"></strong>
                    <span x-text="getStickyProgressText()"></span>
                </div>
                <div class="competence-eval-sticky-track" x-bind:style="{ '--pct': getGradedPct() + '%' }">
                    <div class="competence-fill"></div>
                </div>
                <div class="competence-eval-sticky-pct" x-text="getGradedPct() + '%'"></div>
                <div class="competence-eval-sticky-actions">
                    <button type="button" class="ti-btn ghost sm" @click="resetGrades()"
                            x-text-label="interface.evaluation.actions.reset"></button>
                    <button type="button" class="ti-btn sm" x-show="userRole !== 4" @click="saveDraft()"
                            x-text-label="interface.evaluation.actions.save-draft"></button>
                    <button type="button" class="ti-btn primary sm" @click="submitEvaluation()"
                            x-text-label="interface.evaluation.actions.submit"></button>
                </div>
            </div>

            <!-- Finalize team feedback: manager / supervisor, after the team-feedback deadline (design 3.4 / 3.8) -->
            <div class="competence-eval-sticky-bar" x-show="canFinalizeTeam">
                <div class="competence-eval-sticky-label">
                    <strong x-text-label="interface.evaluation.finalize-team-title"></strong>
                    <span x-text-label="interface.evaluation.finalize-team-hint"></span>
                </div>
                <div class="ti-spacer"></div>
                <div class="competence-eval-sticky-actions">
                    <button type="button" class="ti-btn primary sm" @click="finalizeTeamFeedback()"
                            x-text-label="interface.evaluation.actions.finalize-team"></button>
                </div>
            </div>

        </div>
    </template>
</div>
