<title id="ti-page-title" hx-swap-oob="outerHTML">{ti-title-placeholder}</title>
<div class="ti-content pane" x-data="competencyEvaluation()">
    <div class="ti-panel ti-sub-panel" x-show="personal && manager">
        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.personal.title"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.personal.name"></div>
            <div class="ti-data-value" x-text="personal.name"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.organization-unit-id"></div>
            <div class="ti-data-value" x-text="personal.organizationUnitName"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.manager"></div>
            <div class="ti-data-value" x-text="manager.name"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.starting-date"></div>
            <div class="ti-data-value" x-text="formatDate( personal.startingDate )"></div>
        </div>
    </div>

    <div x-show="showEvaluationForm && (userRole === 1 || userRole === 2 || userRole === 4) && canEdit" class="ti-button-bar ti-sub-panel">
        <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                x-on:click="resetGrades()"
                x-text-label="interface.evaluation.actions.reset"></button>
        <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                x-show="( userRole === 1 || userRole === 2 ) && canEdit"
                x-on:click="saveDraft()"
                x-text-label="interface.evaluation.actions.save-draft"></button>
        <button type="button" class="ti-button ti-glass-btn-black large on-screen primary"
                x-on:click="submitEvaluation()"
                x-text-label="interface.evaluation.actions.submit"></button>
    </div>

    <div x-show="showEvaluationForm && evaluation" class="ti-panel ti-sub-panel role-banner" x-bind:class="getUserRoleAsText()">
        <div class="role-banner-text" x-show="userRole">
            <span x-show="userRole === 1" x-text-label="interface.evaluation.banners.employee"></span>
            <span x-show="userRole === 2" x-text-label="interface.evaluation.banners.manager"></span>
            <span x-show="userRole === 4" x-text-label="interface.evaluation.banners.team"></span>
        </div>

        <div x-show="warningMessage" class="competence-warning-box">
            <div class="ti-icon warning dark-style" role="img" x-text-label:aria-label="interface.evaluation.warnings.title"></div>
            <div class="competence-warning-text" x-text="getLabel( warningMessage )"></div>
        </div>

        <span class="ti-spacer-v-10" x-show="userRole"></span>

        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.appraisal.title"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.cycle"></div>
            <div class="competence-grid-value-group appraisal-cycle">
                <div class="ti-data-value compact-centered" x-text="evaluation.cycleID"></div>
                <div class="ti-data-value" x-text="formatDate( evaluation.cycleDate )"></div>
            </div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.career-path"></div>
            <div class="competence-grid-value-group level">
                <div class="ti-data-value compact-centered" x-text="evaluation.stageLevel"></div>
                <div class="ti-data-value" x-text="evaluation.careerPathName"></div>
            </div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.interview-date" x-show="userRole !== 4"></div>
            <div class="ti-data-value" x-text="formatDate( evaluation.interviewDate, 'interface.evaluation.appraisal.interview-date-not-set' )"
                 x-show="userRole !== 4"></div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.submission-deadline"></div>
            <div class="ti-data-value" x-text="formatDate( deadlineDate, 'interface.evaluation.appraisal.submission-deadline-not-set' )"></div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.final-score" x-show="userRole !== 4"></div>
            <div class="competence-grid-value-group score" x-show="userRole !== 4">
                <div class="ti-data-value compact-centered"
                     x-text="evaluation.finalScore && evaluation.finalScore.score ? evaluation.finalScore.score : '-'"></div>
                <div class="ti-data-value"
                     x-text="getLabel( evaluation.finalScore && evaluation.finalScore.interpretationName ? evaluation.finalScore.interpretationName : 'interface.evaluation.default.not-ready' )"></div>
            </div>
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.current-status"></div>
            <div class="competence-grid-value-group status">
                <div class="ti-data-value compact-centered" x-text="getLabel( evaluation.statusName )"></div>
                <div class="competence-status-description" x-text="getLabel( evaluation.statusDescription )"></div>
            </div>
        </div>

        <span class="ti-spacer-v-10"></span>

        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.instructions.title"></div>
        <div class="competence-instructions">
            <div class="competence-grading-name" x-text-label="interface.evaluation.instructions.grades"></div>
            <div class="competence-grading-name" x-text-label="interface.evaluation.instructions.team-grading" x-show="userRole === 4"></div>
            <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                <div class="competence-grid-value-group grading">
                    <div class="ti-data-value compact-centered" x-text="gradeKey"></div>
                    <div class="competence-grading-name" x-text="grade.name"></div>
                    <div class="competence-grading-description" x-text="grade.description"></div>
                </div>
            </template>
        </div>

        <span class="ti-spacer-v-10"></span>

        <div class="competence-list">
            <div class="competence-list-head">
                <div class="competence-list-head-label title" x-text-label="interface.evaluation.competencies.title"></div>
                <div class="competence-list-head-label appraisals" x-text-label="interface.evaluation.competencies.appraisals"></div>
                <div class="competence-list-head-label self" x-text-label="interface.evaluation.competencies.self"></div>
                <div class="competence-list-head-label manager" x-text-label="interface.evaluation.competencies.manager"></div>
                <div class="competence-list-head-label team" x-text-label="interface.evaluation.competencies.team"></div>
            </div>

            <template x-for="category in competencies" x-bind:key="category.id">
                <div class="competence-category">
                    <div class="competence-category-header">
                        <div class="competence-category-name" x-text="category.name"></div>
                        <div class="competence-category-description" x-text="category.description"></div>
                    </div>
                    <div class="ti-form-grid competence" x-show="userRole !== 4">
                        <div class="ti-label" x-text-label="interface.evaluation.appraisal.category-score"></div>
                        <div class="competence-grid-value-group score">
                            <div class="ti-data-value compact-centered"
                                 x-text="evaluation.scores[category.id] ? evaluation.scores[category.id].score : '-'"></div>
                            <div class="ti-data-value"
                                 x-text="getLabel( evaluation.scores[category.id] ? evaluation.scores[category.id].interpretationName : 'interface.evaluation.default.not-ready' )"></div>
                        </div>
                    </div>
                    <template x-for="sub in category.subcategories" x-bind:key="sub.id">
                        <div class="competence-subcategory">
                            <div class="competence-subcategory-title" x-text="' » ' + sub.name"></div>

                            <!-- Collective Subcategory Row (Visible only to Team in Collective mode) -->
                            <div class="competence-row" x-show="userRole === 4 && isTeamEvaluationCollective">
                                <div class="competence-info">
                                    <div class="competence-code" x-text="sub.id"></div>
                                    <div class="competence-name" x-text="sub.name"></div>
                                </div>
                                <div class="ti-data-value compact-centered">
                                    <span class="ti-icon lock dark-style competence-icon-lock" role="img"
                                          x-text-label:aria-label="interface.evaluation.competencies.locked"></span>
                                </div>
                                <div class="ti-data-value compact-centered">
                                    <span class="ti-icon lock dark-style competence-icon-lock" role="img"
                                          x-text-label:aria-label="interface.evaluation.competencies.locked"></span>
                                </div>
                                <select x-bind:name="'grade-team-collective-' + sub.id" class="ti-input grade"
                                        x-bind:aria-label="'Team grade for ' + sub.id + ' ' + sub.name"
                                        x-on:change="setItemGrade( sub.id, 'team', $event.target.value )"
                                        x-show="canEdit">
                                    <option value="" x-bind:selected="!getItemGrade( sub.id, 'team' )">-</option>
                                    <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                        <option x-bind:value="gradeKey" x-text="gradeKey"
                                                x-bind:selected="getItemGrade( sub.id, 'team' ) == gradeKey"></option>
                                    </template>
                                </select>
                                <div class="ti-data-value compact-centered" x-text="getItemGrade( sub.id, 'team' ) || '-'"
                                     x-show="!canEdit"></div>
                                <div class="competence-item-description" x-text="sub.description"></div>
                            </div>

                            <template x-for="item in sub.items" x-bind:key="item.id">
                                <div class="competence-row" x-show="userRole !== 4 || !isTeamEvaluationCollective">
                                    <div class="competence-info">
                                        <div class="competence-code" x-text="item.id"></div>
                                        <div class="competence-name" x-text="item.name"></div>
                                    </div>
                                    <!-- Self-Grade Column -->
                                    <select x-bind:name="'grade-employee-' + item.id" class="ti-input grade"
                                            x-bind:aria-label="'Self grade for ' + item.id + ' ' + item.name"
                                            x-on:change="setItemGrade( item.id, 'employee', $event.target.value )"
                                            x-bind:data-ti-tooltip="item.description"
                                            x-show="userRole === 1 && canEdit">
                                        <option value="" x-bind:selected="!getItemGrade( item.id, 'employee' )">-</option>
                                        <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade( item.id, 'employee' ) == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="ti-data-value compact-centered" x-text="getItemGrade( item.id, 'employee', '-' )"
                                         x-show="userRole === 2 || ( userRole === 1 && !canEdit )"></div>
                                    <div class="ti-data-value compact-centered"
                                         x-show="userRole === 4">
                                        <span class="ti-icon lock dark-style competence-icon-lock" role="img"
                                              x-text-label:aria-label="interface.evaluation.competencies.locked"></span>
                                    </div>

                                    <!-- Manager Grade Column -->
                                    <select x-bind:name="'grade-manager-' + item.id" class="ti-input grade"
                                            x-bind:aria-label="'Manager grade for ' + item.id + ' ' + item.name"
                                            x-on:change="setItemGrade( item.id, 'manager', $event.target.value )"
                                            x-show="userRole === 2 && canEdit">
                                        <option value="" x-bind:selected="!getItemGrade( item.id, 'manager' )">-</option>
                                        <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade( item.id, 'manager' ) == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="ti-data-value compact-centered" x-text="getItemGrade( item.id, 'manager', '-' )"
                                         x-show="userRole === 2 && !canEdit"></div>
                                    <div class="ti-data-value compact-centered"
                                         x-show="userRole === 1 || userRole === 4">
                                        <span class="ti-icon lock dark-style competence-icon-lock" role="img"
                                              x-text-label:aria-label="interface.evaluation.competencies.locked"></span>
                                    </div>

                                    <!-- Team Grade Column -->
                                    <select x-bind:name="'grade-team-' + item.id" class="ti-input grade"
                                            x-bind:aria-label="'Team grade for ' + item.id + ' ' + item.name"
                                            x-on:change="setItemGrade( item.id, 'team', $event.target.value )"
                                            x-show="userRole === 4 && canEdit">
                                        <option value="" x-bind:selected="!getItemGrade( item.id, 'team' )">-</option>
                                        <template x-for="( grade, gradeKey ) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade( item.id, 'team' ) == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="ti-data-value compact-centered" x-text="getItemGrade( item.id, 'team', '-' )"
                                         x-show="userRole === 2 || ( userRole === 4 && !canEdit )"></div>
                                    <div class="ti-data-value compact-centered"
                                         x-show="userRole === 1">
                                        <span class="ti-icon lock dark-style competence-icon-lock" role="img"
                                              x-text-label:aria-label="interface.evaluation.competencies.locked"></span>
                                    </div>

                                    <div class="competence-item-description" x-text="item.description"></div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>

        <span class="ti-spacer-v-10" x-show="userRole === 1 || userRole === 2 || ( userRole === 4 && canEdit )"></span>

        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.appraisal.feedback-title"
             x-show="userRole === 1 || userRole === 2 || ( userRole === 4 && canEdit )"></div>
        <div class="competence-feedback" x-show="userRole === 1 || userRole === 2 || ( userRole === 4 && canEdit )">
            <div class="ti-form-grid feedback" x-show="userRole === 1 || userRole === 2">
                <div class="ti-label" x-text-label="interface.evaluation.appraisal.employee-comment"></div>
                <textarea name="employeeFeedbackText" class="ti-input area" rows="4"
                          x-bind:value="getFeedbackComment( 'employee' )"
                          x-on:input="setFeedbackComment( 'employee', $event.target.value )"
                          x-show="userRole === 1 && canEdit"></textarea>
                <div class="ti-data-value" x-text="getFeedbackComment( 'employee' )"
                     x-show="userRole === 2 || ( userRole === 1 && !canEdit )"></div>
            </div>
            <div class="ti-form-grid feedback" x-show="userRole === 1 || userRole === 2">
                <div class="ti-label" x-text-label="interface.evaluation.appraisal.manager-comment"></div>
                <textarea name="managerFeedbackText" class="ti-input area" rows="4"
                          x-bind:value="getFeedbackComment( 'manager' )"
                          x-on:input="setFeedbackComment( 'manager', $event.target.value )"
                          x-show="userRole === 2 && canEdit"></textarea>
                <div class="ti-data-value" x-text="getFeedbackComment( 'manager' )"
                     x-show="userRole === 1 || ( userRole === 2 && !canEdit )"></div>
            </div>
            <div class="ti-form-grid feedback" x-show="userRole === 2 || ( userRole === 4 && canEdit )">
                <div class="ti-label" x-text-label="interface.evaluation.appraisal.team-comment"></div>
                <textarea name="teamFeedbackText" class="ti-input area" rows="4"
                          x-on:input="setFeedbackComment( 'team', $event.target.value )"
                          x-show="userRole === 4 && canEdit"></textarea>
                <div class="competence-team-feedback-grid" x-show="userRole === 2">
                    <template x-for="( comment, index ) in getFeedbackComment( 'team' )" x-bind:key="index">
                        <div class="ti-data-value" x-text="comment || getLabel( 'interface.evaluation.default.not-provided' )"></div>
                    </template>
                    <template x-if="getFeedbackComment( 'team' ).length === 0">
                        <div class="ti-data-value" x-text-label="interface.evaluation.default.not-provided"></div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>
