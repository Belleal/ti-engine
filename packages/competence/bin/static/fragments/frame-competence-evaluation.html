<title id="ti-page-title" hx-swap-oob="outerHTML">{ti-title-placeholder}</title>
<div class="ti-content pane" x-data="competencyEvaluation()">
    <div class="ti-panel competence-sub-panel">
        <div class="competence-sub-panel-title" x-text-label="interface.evaluation.personal.title"></div>
        <div class="competence-grid">
            <div class="competence-label" x-text-label="interface.evaluation.personal.name"></div>
            <div class="competence-data-value" x-text="personal.name"></div>
            <div class="competence-label" x-text-label="interface.evaluation.personal.position"></div>
            <div class="competence-grid-value-group position-level">
                <div class="competence-data-value compact-centered" x-text="personal.level + personal.stage"></div>
                <div class="competence-data-value" x-text="personal.positionName"></div>
            </div>
            <div class="competence-label" x-text-label="interface.evaluation.personal.department"></div>
            <div class="competence-data-value" x-text="personal.department"></div>
            <div class="competence-label" x-text-label="interface.evaluation.personal.manager"></div>
            <div class="competence-data-value" x-text="personal.manager"></div>
            <div class="competence-label" x-text-label="interface.evaluation.personal.starting-date"></div>
            <div class="competence-data-value" x-text="formatDate( personal.startingDate )"></div>
        </div>
    </div>

    <div class="ti-panel competence-sub-panel">
        <div class="competence-sub-panel-title" x-text-label="interface.evaluation.appraisal.title"></div>
        <div class="competence-grid">
            <div class="competence-label" x-text-label="interface.evaluation.appraisal.cycle"></div>
            <div class="competence-grid-value-group appraisal-cycle">
                <div class="competence-data-value compact-centered" x-text="evaluation.cycleID"></div>
                <div class="competence-data-value" x-text="formatDate( evaluation.cycleDate )"></div>
            </div>
            <div class="competence-label" x-text-label="interface.evaluation.appraisal.interview-date"></div>
            <input name="interviewDate" class="competence-input" type="date" x-bind:value="evaluation.interviewDate"
                   x-on:input="setInterviewDate($event.target.value)"/>
        </div>

        <span class="ti-spacer-v-10"></span>

        <div class="competence-list">
            <div class="competence-list-head">
                <div class="competence-list-head-label title" x-text-label="interface.evaluation.competencies.title"></div>
                <div class="competence-list-head-label appraisals" x-text-label="interface.evaluation.competencies.appraisals"></div>
                <div class="competence-list-head-label self" x-text-label="interface.evaluation.competencies.self"></div>
                <div class="competence-list-head-label manager" x-text-label="interface.evaluation.competencies.manager" x-show="isEmployeeManager()"></div>
                <div class="competence-list-head-label team" x-text-label="interface.evaluation.competencies.team" x-show="isEmployeeManager()"></div>
            </div>

            <template x-for="category in competencies" x-bind:key="category.id">
                <div class="competence-category">
                    <div class="competence-category-header">
                        <div class="competence-category-name" x-text="category.name"></div>
                        <div class="competence-category-description" x-text="category.description"></div>
                    </div>
                    <template x-for="sub in category.subcategories" x-bind:key="sub.id">
                        <div class="competence-subcategory">
                            <div class="competence-subcategory-title" x-text="sub.name"></div>
                            <template x-for="item in sub.items" x-bind:key="item.id">
                                <div class="competence-row">
                                    <div class="competence-info">
                                        <div class="competence-code" x-text="item.id"></div>
                                        <div class="competence-name" x-text="item.name"></div>
                                    </div>
                                    <ti-component-tooltip-placeholder>
                                        <select class="competence-input grade" x-on:change="setItemGrade(item.id, 'employee', $event.target.value)"
                                                x-bind:disabled="!isEmployee()" x-bind:aria-disabled="!isEmployee()"
                                                x-bind:data-ti-tooltip="item.description">
                                            <option value="" x-bind:selected="!getItemGrade(item.id, 'employee')">-</option>
                                            <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                                                <option x-bind:value="gradeKey" x-text="gradeKey"
                                                        x-bind:selected="getItemGrade(item.id, 'employee') == gradeKey"></option>
                                            </template>
                                        </select>
                                    </ti-component-tooltip-placeholder>
                                    <select class="competence-input grade" x-on:change="setItemGrade(item.id, 'manager', $event.target.value)"
                                            x-show="isEmployeeManager()">
                                        <option value="" x-bind:selected="!getItemGrade(item.id, 'manager')">-</option>
                                        <template x-for="(grade, gradeKey) in grades" x-bind:key="gradeKey">
                                            <option x-bind:value="gradeKey" x-text="gradeKey"
                                                    x-bind:selected="getItemGrade(item.id, 'manager') == gradeKey"></option>
                                        </template>
                                    </select>
                                    <div class="competence-data-value compact-centered" x-text="getItemGrade(item.id, 'team', '-')"
                                         x-show="isEmployeeManager()"></div>
                                    <div class="competence-category-description" x-text="item.description"></div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</div>
