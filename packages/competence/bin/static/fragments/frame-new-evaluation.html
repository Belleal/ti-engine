<title id="ti-page-title" hx-swap-oob="outerHTML">{ti-title-placeholder}</title>
<div class="ti-content pane" x-data="newEvaluation()">
    <div class="ti-panel ti-sub-panel" x-show="personal.name">
        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.personal.title"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.personal.name"></div>
            <div class="ti-data-value" x-text="personal.name"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.organization-unit-id"></div>
            <div class="ti-data-value" x-text="personal.organizationUnitName"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.manager"></div>
            <div class="ti-data-value" x-text="manager.name"></div>
            <div class="ti-label" x-text-label="interface.evaluation.personal.starting-date"></div>
            <div class="ti-data-value" x-text="formatDate( personal.startingDate )"></div>
        </div>
    </div>

    <div class="ti-panel ti-sub-panel" x-show="personal.name">
        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.appraisal.data"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.cycle"></div>
            <div class="ti-data-value" x-text="evaluation.cycleID"></div>

            <div class="ti-label" x-text-label="interface.evaluation.appraisal.career-path"></div>
            <div class="competence-grid-value-group level">
                <div class="ti-data-value compact-centered" x-text="evaluation.stageLevel"></div>
                <div class="ti-data-value" x-text="evaluation.careerPathName"></div>
            </div>
        </div>

        <span class="ti-spacer-v-10"></span>

        <div class="ti-sub-panel-title" x-text-label="interface.evaluation.appraisal.team-selection"></div>
        <div class="ti-form-grid competence">
            <div class="ti-label" x-text-label="interface.evaluation.appraisal.employee-list"></div>
            <div class="new-evaluation-team-selection">
                <select class="ti-input"
                        x-bind:value="selectedTeamMemberID"
                        x-on:change="selectedTeamMemberID = $event.target.value">
                    <option value=""></option>
                    <template x-for="member in availableTeamMembers" x-bind:key="member.employeeID">
                        <option x-bind:value="member.employeeID" x-text="member.name + ' - ' + member.careerPathName"></option>
                    </template>
                </select>
                <button type="button" class="ti-button inline ti-glass-btn-black large on-screen" x-on:click="addTeamMember()"
                        x-text-label="interface.evaluation.actions.add-team-member"></button>
            </div>
        </div>

        <template x-if="team.length > 0">
            <div class="new-evaluation-team-list">
                <template x-for="member in team" x-bind:key="member.employeeID">
                    <div class="new-evaluation-team-member">
                        <span x-text="member.name"></span>
                        <button type="button" class="ti-button icon-only ti-glass-btn-black" x-on:click="removeTeamMember( member.employeeID )">
                            <span class="ti-icon remove-small" role="img" x-text-label:aria-label="interface.evaluation.actions.remove"></span>
                        </button>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <div class="ti-button-bar ti-sub-panel">
        <button type="button" class="ti-button ti-glass-btn-black large on-screen" x-on:click="cancel()"
                x-text-label="interface.evaluation.actions.cancel"></button>
        <button type="button" class="ti-button ti-glass-btn-black large on-screen primary" x-on:click="submitNewEvaluation()"
                x-text-label="interface.evaluation.actions.submit"></button>
    </div>
</div>
