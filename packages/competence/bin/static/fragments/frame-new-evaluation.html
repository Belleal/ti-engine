<div class="ti-page" x-data="competenceNewEvaluation">

    <!-- Empty state: no active cycle. The backend refused the load with code 5005 +
         "error.evaluation.no-active-cycle"; render an inline panel instead of a toast and hide the action bar. -->
    <template x-if="noActiveCycle">
        <div class="ti-panel competence-panel-mb">
            <div class="ti-empty-state">
                <div class="ti-empty-state-icon" aria-hidden="true">
                    <span class="ti-icon cycles-loop xl"></span>
                </div>
                <div class="ti-empty-state-title" x-text-label="interface.evaluation.new-eval.no-cycle-title"></div>
                <div class="ti-empty-state-desc" x-text-label="interface.evaluation.new-eval.no-cycle-desc"></div>
            </div>
        </div>
    </template>

    <template x-if="personal.name">
        <div>
            <!-- #1 Page header -->
            <div class="ti-page-head">
                <div class="ti-page-eyebrow" x-text-label="interface.evaluation.new-eval.page-eyebrow"></div>
                <h1 class="ti-page-title" x-text="getPageTitle()"></h1>
                <p class="ti-page-subtitle" x-text-label="interface.evaluation.new-eval.page-desc"></p>
            </div>

            <!-- #2/#3 Employee panel -->
            <div class="competence-eval-employee-card competence-panel-mb">
                <div class="competence-eval-emp-top-row">
                    <div class="competence-eval-emp-avatar-block">
                        <div class="ti-avatar xl" x-bind:style="$store.tiToolbox.generateAvatarStyle( personal.id, personal.name )"
                             x-bind:aria-label="personal.name">
                            <span x-text="( personal.name || '?' ).charAt( 0 ).toUpperCase()"></span>
                        </div>
                        <div class="competence-eval-emp-info">
                            <div class="competence-eval-emp-name" x-text="personal.name"></div>
                            <div class="competence-eval-context">
                                <div class="competence-eval-context-item">
                                    <div class="competence-eval-context-label" x-text-label="interface.evaluation.context.role-family"></div>
                                    <div class="competence-eval-context-value" x-text="evaluation.roleFamilyName || '—'"></div>
                                </div>
                                <div class="competence-eval-context-item">
                                    <div class="competence-eval-context-label" x-text-label="interface.evaluation.context.specialization"></div>
                                    <div class="competence-eval-context-value"
                                         x-bind:class="personal.specializationName ? '' : 'is-generalist'"
                                         x-text="personal.specializationName || getLabel( 'interface.evaluation.context.generalist' )"></div>
                                </div>
                                <div class="competence-eval-context-item">
                                    <div class="competence-eval-context-label" x-text-label="interface.evaluation.context.stage-level"></div>
                                    <div class="competence-eval-context-value">
                                            <span class="competence-level-pip"
                                                  x-show="evaluation.stageLevel"
                                                  x-bind:class="evaluation.stageLevel ? evaluation.stageLevel.charAt( 0 ) : ''"
                                                  x-text="evaluation.stageLevel"></span>
                                        <span x-show="!evaluation.stageLevel">—</span>
                                    </div>
                                </div>
                            </div>
                            <div class="competence-eval-emp-career">
                                <span x-text="personal.organizationUnitName"></span>
                                <span class="competence-eval-sub-sep" x-show="personal.startingDate">·</span>
                                <span x-show="personal.startingDate"
                                      x-text="getLabel( 'interface.evaluation.personal.joined' ) + ' ' + formatDate( personal.startingDate, '' )"></span>
                            </div>
                            <div class="competence-eval-emp-meta">
                                <span x-text-label="interface.evaluation.personal.manager"></span>
                                <span x-text="manager.name"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- #4 Cycle & framework panel -->
            <div class="ti-panel competence-panel-body competence-panel-mb">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.evaluation.new-eval.cycle-title"></div>
                    <span class="ti-panel-head-aside" x-text-label="interface.evaluation.new-eval.cycle-desc"></span>
                </div>
                <div class="ti-kv-grid">
                    <span class="ti-kv-label" x-text-label="interface.evaluation.new-eval.cycle-id"></span>
                    <span class="ti-kv-value">
                        <span class="ti-tag mono" x-text="evaluation.cycleID"></span>
                    </span>
                    <span class="ti-kv-label" x-text-label="interface.evaluation.new-eval.closing-date"></span>
                    <span class="ti-kv-value" x-text="formatDate(evaluation.cycleEndDate)"></span>
                    <span class="ti-kv-label" x-text-label="interface.evaluation.new-eval.career-framework"></span>
                    <span class="ti-kv-value">
                        <span class="competence-level-pip" x-bind:class="evaluation.stageLevel ? evaluation.stageLevel.charAt(0) : ''"
                              x-text="evaluation.stageLevel"></span>
                        <span x-text="evaluation.roleFamilyName"></span>
                    </span>
                    <span class="ti-kv-label" x-text-label="interface.evaluation.new-eval.competencies-to-grade"></span>
                    <span class="ti-kv-value" x-text="getCompetencyCountText()"></span>
                </div>
            </div>

            <!-- #5/#6/#7 Team reviewers panel -->
            <div class="ti-panel competence-panel-body competence-panel-mb">
                <div class="ti-panel-head">
                    <div class="ti-panel-title">
                        <span x-text-label="interface.evaluation.new-eval.team-title"></span>
                        <span class="ti-panel-title-aside" x-show="minTeamMembers === 0" x-text-label="interface.evaluation.new-eval.team-optional"></span>
                    </div>
                    <span class="ti-panel-head-aside" x-show="getTeamHintText()" x-text="getTeamHintText()"></span>
                </div>
                <div class="ti-panel-body-intro" x-text="getTeamPanelDesc()"></div>
                <div class="competence-new-eval-select-row">
                    <select class="ti-select" x-bind:value="selectedTeamMemberID" @change="selectedTeamMemberID = $event.target.value">
                        <option value="" x-text-label="interface.evaluation.new-eval.choose-colleague"></option>
                        <template x-for="member in availableTeamMembers" x-bind:key="member.employeeID">
                            <option x-bind:value="member.employeeID" x-text="member.name + ' — ' + member.roleFamilyName"></option>
                        </template>
                    </select>
                    <button type="button" class="ti-btn primary" @click="addTeamMember()"
                            x-bind:disabled="maxTeamMembers !== null && team.length >= maxTeamMembers"
                            x-text-label="interface.evaluation.new-eval.add-reviewer"></button>
                </div>

                <!-- Selected team chips with avatars -->
                <div class="competence-team-chip-list">
                    <template x-for="member in team" x-bind:key="member.employeeID">
                        <div class="competence-team-chip">
                            <div class="ti-avatar xs" x-bind:style="$store.tiToolbox.generateAvatarStyle(member.employeeID, member.name)"
                                 x-bind:aria-label="member.name">
                                <span x-text="(member.name || '?').charAt(0).toUpperCase()"></span>
                            </div>
                            <span x-text="member.name"></span>
                            <button type="button" class="competence-team-chip-x" @click="removeTeamMember(member.employeeID)"
                                    x-bind:aria-label="'Remove ' + member.name">
                                <span class="ti-icon close xs" aria-hidden="true"></span>
                            </button>
                        </div>
                    </template>
                    <div class="competence-new-eval-chip-empty" x-show="team.length === 0"
                         x-text-label="interface.evaluation.appraisal.empty-team-list"></div>
                </div>
            </div>
        </div>
    </template>

    <!-- #8 Sticky action bar — only meaningful when there's an evaluation to open. Hide it in the empty state
         (no active cycle, or employee data not loaded) so the user isn't tempted to click an inert "Open evaluation". -->
    <div class="competence-eval-sticky-bar competence-new-eval-sticky" x-show="personal.name && !noActiveCycle">
        <button type="button" class="ti-btn ghost sm" @click="cancel()" x-text-label="interface.evaluation.actions.cancel"></button>
        <button type="button" class="ti-btn primary sm" @click="submitNewEvaluation()">
            <span class="ti-icon send sm" aria-hidden="true"></span>
            <span x-text-label="interface.evaluation.new-eval.open-evaluation"></span>
        </button>
    </div>
</div>
