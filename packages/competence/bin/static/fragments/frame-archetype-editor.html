<div class="ti-page" x-data="competenceArchetypeEditor">
    <div class="ti-page-head competence-cte-pagehead">
        <div class="competence-cte-pagehead-main">
            <div class="ti-page-eyebrow" x-text-label="interface.admin.archetype.page-eyebrow">CONFIGURATION</div>
            <h1 class="ti-page-title" x-text-label="interface.admin.archetype.page-title">Relevancy Archetypes</h1>
        </div>
        <div class="competence-cte-pagehead-aside">
            <div class="competence-cte-langswitch" role="group" x-bind:aria-label="getLabel('interface.admin.archetype.lang-switch-aria', 'Edit language')">
                <button type="button" class="competence-cte-langswitch-btn"
                        x-bind:class="isEditLang('bg') ? 'is-active' : ''" @click="setEditLang('bg')"
                        x-text-label="interface.admin.text-editor.lang-bg-short">BG</button>
                <button type="button" class="competence-cte-langswitch-btn"
                        x-bind:class="isEditLang('en') ? 'is-active' : ''" @click="setEditLang('en')"
                        x-text-label="interface.admin.text-editor.lang-en-short">EN</button>
            </div>
            <button type="button" class="ti-btn ghost sm" @click="backToConfig()">
                <span class="ti-icon chevron-left sm" aria-hidden="true"></span>
                <span x-text-label="interface.admin.archetype.back"></span>
            </button>
        </div>
    </div>

    <template x-if="loaded">
        <div class="competence-cte-shell">

            <!-- Left: archetype list + add. -->
            <div class="competence-cte-list-pane">
                <div class="competence-cte-list-head competence-ae-list-head">
                    <span class="competence-ae-list-title" x-text-label="interface.admin.archetype.list-title"></span>
                    <button type="button" class="ti-btn ghost sm" @click="openAdd()">
                        <span class="ti-icon plus sm" aria-hidden="true"></span>
                        <span x-text-label="interface.admin.archetype.add-btn"></span>
                    </button>
                </div>
                <div class="competence-cte-list">
                    <template x-for="row in rows" x-bind:key="row.id">
                        <button type="button" class="competence-ae-row"
                                x-bind:class="isSelected(row.id) ? 'is-selected' : ''" @click="selectId(row.id)">
                            <span class="ti-tag mono" x-text="row.id"></span>
                            <span class="competence-ae-row-name" x-text="archetypeName(row)"></span>
                            <span class="competence-ae-row-count" x-text="row.assignedCount"
                                  x-bind:title="getLabel('interface.admin.archetype.assigned-title', 'Assigned competencies')"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Right: detail editor stack. -->
            <div class="competence-cte-editor-stack">

                <template x-if="!hasSelection()">
                    <div class="competence-cte-editor-pane">
                        <div class="ti-empty-state">
                            <div class="ti-empty-state-icon" aria-hidden="true">
                                <span class="ti-icon bar-chart xl"></span>
                            </div>
                            <div class="ti-empty-state-title" x-text-label="interface.admin.archetype.no-selection-title"></div>
                            <div class="ti-empty-state-desc" x-text-label="interface.admin.archetype.no-selection-desc"></div>
                        </div>
                    </div>
                </template>

                <template x-if="hasSelection()">
                    <div class="competence-cte-editor-pane">
                        <div class="competence-cte-editor">

                            <div class="competence-cte-editor-head">
                                <div class="competence-cte-editor-title">
                                    <span class="ti-tag mono" x-text="detailId()"></span>
                                    <span class="competence-cte-editor-ctx" x-text="assignedCountLabel()"></span>
                                </div>
                                <div class="competence-cte-editor-langhint">
                                    <span x-text-label="interface.admin.text-editor.editing-label"></span>
                                    <strong x-text="langLabel(editLang)"></strong>
                                </div>
                            </div>

                            <template x-if="saveErrors.length > 0">
                                <div class="competence-cte-errors">
                                    <div class="competence-cte-errors-head">
                                        <span class="ti-icon warning-triangle sm" aria-hidden="true"></span>
                                        <span x-text-label="interface.admin.archetype.errors-title"></span>
                                    </div>
                                    <template x-for="(issue, idx) in saveErrors" x-bind:key="idx">
                                        <div class="competence-cte-error-row">
                                            <span class="ti-tag mono" x-text="issue.id"></span>
                                            <span class="competence-cte-error-msg" x-text="issue.message"></span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- Name -->
                            <div class="competence-cte-field">
                                <label class="ti-field-label" x-text-label="interface.admin.archetype.field-name"></label>
                                <input type="text" class="ti-input" x-bind:value="fieldValue('name')"
                                       @input="setField('name', $event.target.value)"/>
                                <div class="competence-cte-ref">
                                    <span class="competence-cte-ref-lang" x-text="refLangLabel()"></span>
                                    <span class="competence-cte-ref-text" x-text="fieldRef('name')"></span>
                                </div>
                            </div>

                            <!-- Description -->
                            <div class="competence-cte-field">
                                <label class="ti-field-label" x-text-label="interface.admin.archetype.field-description"></label>
                                <textarea class="ti-input competence-cte-textarea" rows="3"
                                          x-bind:value="fieldValue('description')"
                                          @input="setField('description', $event.target.value)"></textarea>
                                <div class="competence-cte-ref">
                                    <span class="competence-cte-ref-lang" x-text="refLangLabel()"></span>
                                    <span class="competence-cte-ref-text" x-text="fieldRef('description')"></span>
                                </div>
                            </div>

                            <!-- Weights + live curve preview -->
                            <div class="competence-cte-field">
                                <div class="competence-ae-weights-head">
                                    <label class="ti-field-label" x-text-label="interface.admin.archetype.field-weights"></label>
                                    <div class="competence-aa-spark competence-ae-preview" aria-hidden="true">
                                        <template x-for="(bar, bIdx) in detailCurve()" x-bind:key="bIdx">
                                            <span class="competence-aa-spark-bar" x-bind:style="barStyle(bar.weight)"
                                                  x-bind:title="bar.level + ': ' + bar.weight"></span>
                                        </template>
                                    </div>
                                </div>
                                <div class="competence-ae-weights-grid">
                                    <template x-for="level in stageLevels" x-bind:key="level">
                                        <div class="competence-ae-weight">
                                            <label class="competence-ae-weight-label" x-text="level"></label>
                                            <input type="number" min="1" max="10" step="1" class="ti-input competence-ae-weight-input"
                                                   x-bind:value="weightValue(level)" @input="setWeight(level, $event.target.value)"/>
                                        </div>
                                    </template>
                                </div>
                                <div class="competence-ae-weights-hint" x-text-label="interface.admin.archetype.weights-hint"></div>
                            </div>

                            <!-- Remove (only when unassigned) -->
                            <div class="competence-ae-danger">
                                <div class="competence-ae-danger-text">
                                    <div class="competence-ae-danger-title" x-text-label="interface.admin.archetype.remove-title"></div>
                                    <div class="competence-ae-danger-desc"
                                         x-text="canRemove() ? getLabel('interface.admin.archetype.remove-desc') : getLabel('interface.admin.archetype.remove-blocked')"></div>
                                </div>
                                <button type="button" class="ti-btn ghost competence-ae-remove" @click="removeSelected()"
                                        x-bind:disabled="!canRemove()" x-text-label="interface.admin.archetype.remove-btn"></button>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="isDirty()">
                    <div class="competence-cte-actions-panel">
                        <div class="competence-cte-actions-state" x-text-label="interface.admin.archetype.unsaved-state"></div>
                        <div class="competence-cte-actions-spacer"></div>
                        <button type="button" class="ti-btn ghost" @click="discard()" x-bind:disabled="saving"
                                x-text-label="interface.admin.archetype.discard-btn"></button>
                        <button type="button" class="ti-btn primary" @click="save()" x-bind:disabled="saving">
                            <span class="ti-icon send sm" aria-hidden="true"></span>
                            <span x-text-label="interface.admin.archetype.save-btn"></span>
                        </button>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- =============================================================
         Add archetype modal
         ============================================================= -->
    <template x-if="modal.kind === 'add'">
        <div class="ti-modal-backdrop" @click.self="closeModal()" @keydown.escape.window="closeModal()">
            <div class="ti-modal" role="dialog" aria-modal="true">
                <div class="ti-modal-head">
                    <div class="ti-modal-title" x-text-label="interface.admin.archetype.add-modal-title"></div>
                    <button type="button" class="ti-modal-close" @click="closeModal()" aria-label="Close">
                        <span class="ti-icon close md" aria-hidden="true"></span>
                    </button>
                </div>
                <div class="ti-modal-body">
                    <label class="ti-field-label" x-text-label="interface.admin.archetype.add-id-label"></label>
                    <input type="text" class="ti-input" x-model="modal.payload.id" @keydown.enter="confirmAdd()"/>
                    <div class="competence-ae-add-error" x-show="modal.payload.error" x-text="modal.payload.error"></div>
                </div>
                <div class="ti-modal-foot">
                    <button type="button" class="ti-btn ghost" @click="closeModal()" x-text-label="interface.admin.archetype.add-cancel-btn"></button>
                    <button type="button" class="ti-btn primary" @click="confirmAdd()" x-text-label="interface.admin.archetype.add-confirm-btn"></button>
                </div>
            </div>
        </div>
    </template>
</div>
