<title id="ti-page-title" hx-swap-oob="outerHTML">{ti-title-placeholder}</title>
<div class="ti-content pane employees-pane" x-data="employeesList()">
    <div class="ti-panel ti-sub-panel">
        <div class="ti-sub-panel-title" x-text-label="interface.employees.title"></div>
        <div class="ti-form-grid employees">
            <div class="ti-label" x-text-label="interface.employees.unit.type"></div>
            <div class="ti-data-value" x-text="unitType"></div>
            <div class="ti-label" x-text-label="interface.employees.unit.name"></div>
            <div class="ti-data-value" x-text="unitName"></div>
            <div class="ti-label" x-text-label="interface.employees.unit.managers"></div>
            <div class="ti-data-value" x-text="unitManagers"></div>
            <div class="ti-label" x-text-label="interface.employees.unit.location"></div>
            <div class="ti-data-value" x-text="unitLocation"></div>
        </div>
    </div>

    <div class="ti-panel ti-sub-panel employees-list-panel">
        <div class="employees-list">
            <template x-if="!hasHierarchy">
                <div>
                    <template x-if="employees.length > 0">
                        <div class="employees-table">
                            <div class="employees-static">
                                <div class="employees-list-head-static">
                                    <div class="employees-list-head-label id" x-text-label="interface.employees.columns.id"></div>
                                    <div class="employees-list-head-label name" x-text-label="interface.employees.columns.name"></div>
                                </div>

                                <template x-for="(employee, index) in employees" x-bind:key="'static-' + index">
                                    <div class="employees-row-static">
                                        <div class="employees-id" x-text="employee.id"></div>
                                        <div class="ti-data-value" x-text="employee.name"></div>
                                    </div>
                                </template>
                            </div>

                            <div class="employees-list-scroll">
                                <div class="employees-list-head-dynamic">
                                    <div class="employees-list-head-label position" x-text-label="interface.employees.columns.position"></div>
                                    <div class="employees-list-head-label level" x-text-label="interface.employees.columns.level"></div>
                                    <div class="employees-list-head-label since" x-text-label="interface.employees.columns.since"></div>
                                    <div class="employees-list-head-label evaluation" x-text-label="interface.employees.columns.evaluation"></div>
                                </div>

                                <template x-for="(employee, index) in employees" x-bind:key="'dynamic-' + index">
                                    <div class="employees-row-dynamic">
                                        <div class="ti-data-value" x-text="employee.position"></div>
                                        <div class="ti-data-value compact-centered" x-text="employee.level"></div>
                                        <div class="ti-data-value" x-text="employee.since"></div>
                                        <div class="employees-evaluation">
                                            <div class="employees-evaluation-open" x-show="employee.evaluation.status === 'open'">
                                                <span class="employees-evaluation-status" x-text-label="interface.employees.status.open"></span>
                                                <span class="employees-evaluation-date" x-text="employee.evaluation.date"></span>
                                                <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                                                        x-text-label="interface.employees.actions.review"></button>
                                            </div>
                                            <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                                                    x-show="employee.evaluation.status === 'new'"
                                                    x-text-label="interface.employees.actions.start-new"></button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template x-if="hasHierarchy">
                <div class="employees-hierarchy">
                    <template x-for="unit in flatUnits" x-bind:key="unit.id">
                        <div class="employees-unit">
                            <div class="employees-unit-header competence-category-header">
                                <div class="employees-unit-name"
                                     x-bind:class="unit.depth === 0 ? 'competence-category-name' : 'competence-subcategory-title'"
                                     x-text="unit.displayName"></div>
                                <div class="competence-category-description" x-text="unit.managersLabel"></div>
                            </div>
                            <div class="employees-list">
                                <template x-if="unit.employees.length > 0">
                                    <div class="employees-table">
                                        <div class="employees-static">
                                            <div class="employees-list-head-static">
                                                <div class="employees-list-head-label id" x-text-label="interface.employees.columns.id"></div>
                                                <div class="employees-list-head-label name" x-text-label="interface.employees.columns.name"></div>
                                            </div>

                                            <template x-for="(employee, index) in unit.employees" x-bind:key="'unit-static-' + unit.id + '-' + index">
                                                <div class="employees-row-static">
                                                    <div class="employees-id" x-text="employee.id"></div>
                                                    <div class="ti-data-value" x-text="employee.name"></div>
                                                </div>
                                            </template>
                                        </div>

                                        <div class="employees-list-scroll">
                                            <div class="employees-list-head-dynamic">
                                                <div class="employees-list-head-label position" x-text-label="interface.employees.columns.position"></div>
                                                <div class="employees-list-head-label level" x-text-label="interface.employees.columns.level"></div>
                                                <div class="employees-list-head-label since" x-text-label="interface.employees.columns.since"></div>
                                                <div class="employees-list-head-label evaluation" x-text-label="interface.employees.columns.evaluation"></div>
                                            </div>

                                            <template x-for="(employee, index) in unit.employees" x-bind:key="'unit-dynamic-' + unit.id + '-' + index">
                                                <div class="employees-row-dynamic">
                                                    <div class="ti-data-value" x-text="employee.position"></div>
                                                    <div class="ti-data-value compact-centered" x-text="employee.level"></div>
                                                    <div class="ti-data-value" x-text="employee.since"></div>
                                                    <div class="employees-evaluation">
                                                        <div class="employees-evaluation-open" x-show="employee.evaluation.status === 'open'">
                                                            <span class="employees-evaluation-status" x-text-label="interface.employees.status.open"></span>
                                                            <span class="employees-evaluation-date" x-text="employee.evaluation.date"></span>
                                                            <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                                                                    x-text-label="interface.employees.actions.review"></button>
                                                        </div>
                                                        <button type="button" class="ti-button ti-glass-btn-black large on-screen"
                                                                x-show="employee.evaluation.status === 'new'"
                                                                x-text-label="interface.employees.actions.start-new"></button>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</div>
