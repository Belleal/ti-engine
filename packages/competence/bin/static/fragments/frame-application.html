<div class="ti-app-shell" x-data="tiAppShell" x-bind:class="{ collapsed: collapsed }">
    <nav class="ti-sidebar" aria-label="Main navigation">
        <button class="ti-sidebar-collapse-btn" @click="toggleCollapse()" x-bind:aria-label="collapsed ? 'Expand sidebar' : 'Collapse sidebar'" type="button">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                <path d="M6.5 2L3.5 5L6.5 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Brand -->
        <div class="ti-sidebar-brand">
            <div class="ti-sidebar-brand-mark">C</div>
            <div class="ti-sidebar-brand-text-block">
                <span class="ti-sidebar-brand-text">Competence</span>
                <span class="ti-sidebar-brand-sub"
                      x-text="($store.tiApplication.configuration && $store.tiApplication.configuration.cycle && $store.tiApplication.configuration.cycle.name) || $store.tiApplication.getLabel('interface.sidebar.cycle-loading', 'Loading…')">Cycle</span>
            </div>
        </div>

        <!-- Workspace navigation -->
        <div class="ti-sidebar-section-label" x-text-label="interface.navigation.workspace">Workspace</div>
        <div class="ti-sidebar-nav" x-data="{ active: 'dashboard' }">
            <button hx-get="/app/dashboard" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'dashboard'"
                    x-bind:class="{ active: active === 'dashboard' }" class="ti-sidebar-item" data-tip="Dashboard" aria-label="Dashboard" type="button">
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.topbar.dashboard">Dashboard</span>
            </button>

            <button hx-get="/app/employees-list" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'employees'"
                    x-bind:class="{ active: active === 'employees' }" class="ti-sidebar-item" data-tip="Employees" aria-label="Employees" type="button">
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.topbar.employees">Employees</span>
            </button>

            <button hx-get="/app/competence-evaluation" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'evaluation'"
                    x-bind:class="{ active: active === 'evaluation' }" class="ti-sidebar-item" data-tip="My Evaluation" aria-label="My Evaluation" type="button">
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.topbar.evaluation">My Evaluation</span>
            </button>

            <button hx-get="/app/manager-calendar" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'calendar'"
                    x-bind:class="{ active: active === 'calendar' }" class="ti-sidebar-item" data-tip="Availability" aria-label="My Availability Calendar"
                    type="button">
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.topbar.calendar">Availability</span>
            </button>

            <button hx-get="/app/interview-schedule" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'interviews'"
                    x-bind:class="{ active: active === 'interviews' }" class="ti-sidebar-item" data-tip="Interviews" aria-label="Interview Schedule" type="button">
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.topbar.interviews">Interviews</span>
            </button>
        </div>

        <!-- Quick links section -->
        <div class="ti-sidebar-section-label" x-text-label="interface.navigation.quick-links">Quick links</div>
        <div class="ti-sidebar-nav">
            <button class="ti-sidebar-item" type="button" x-text-label:data-tip="interface.navigation.process-guide"
                    x-text-label:aria-label="interface.navigation.process-guide" disabled>
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.navigation.process-guide">Process Guide</span>
            </button>
            <button class="ti-sidebar-item" type="button" x-text-label:data-tip="interface.navigation.help" x-text-label:aria-label="interface.navigation.help"
                    disabled>
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label" x-text-label="interface.navigation.help">Help</span>
            </button>
        </div>

        <!-- Footer -->
        <div class="ti-sidebar-foot">
            <button class="ti-sidebar-item" @click="toggleTheme()" data-tip="Toggle theme" aria-label="Toggle theme" type="button">
                <span class="ti-sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </span>
                <span class="ti-sidebar-item-label"
                      x-text="theme === 'daylight' ? $store.tiApplication.getLabel('interface.sidebar.theme-glass') : $store.tiApplication.getLabel('interface.sidebar.theme-daylight')">Toggle Theme</span>
            </button>

            <button class="ti-sidebar-user" type="button"
                    x-text-label:data-tip="interface.topbar.user-profile"
                    data-tip="Your profile">
                <span class="ti-avatar sm" aria-hidden="true"
                      x-text="(($store.tiApplication.user && $store.tiApplication.user.name) || '?').charAt(0).toUpperCase()">?</span>
                <span class="ti-sidebar-user-text">
                    <span class="ti-sidebar-user-name" x-text="($store.tiApplication.user && $store.tiApplication.user.name) || ''"></span>
                    <span class="ti-sidebar-user-sub"
                          x-text="($store.tiApplication.configuration && $store.tiApplication.configuration.employeeLevel && $store.tiApplication.configuration.employeeLevel.careerPathName && $store.tiApplication.configuration.employeeLevel.level) ? ($store.tiApplication.configuration.employeeLevel.careerPathName + ' · ' + $store.tiApplication.configuration.employeeLevel.level) : (($store.tiApplication.user && $store.tiApplication.user.roles) || []).join(' · ')"></span>
                </span>
            </button>
        </div>
    </nav>

    <!-- Content -->
    <div id="ti-content-wrapper" class="ti-content">
        <!-- Topbar -->
        <header class="ti-topbar">
            <div id="ti-topbar-info">
                <div class="ti-topbar-title" hx-swap-oob="outerHTML">{ti-title-placeholder}</div>
                <div class="ti-topbar-sub"
                     x-text="($store.tiApplication.configuration && $store.tiApplication.configuration.cycle && $store.tiApplication.configuration.cycle.name) || ''"></div>
            </div>
            <div class="ti-topbar-spacer"></div>
            <div class="ti-topbar-actions">
                <button class="ti-btn icon ghost" type="button" x-text-label:aria-label="interface.topbar.search" aria-label="Search">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
                <button class="ti-btn icon ghost" type="button" x-text-label:aria-label="interface.topbar.notifications" aria-label="Notifications">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </button>
            </div>
        </header>

        <div id="ti-content" class="ti-page-scrollable">
            <ti-nested-frame-placeholder hx-get="/app/dashboard" hx-trigger="load" hx-target="this" hx-swap="outerHTML"
                                         hx-push-url="true"></ti-nested-frame-placeholder>
        </div>
    </div>

    <!-- Toast notification stack -->
    <div id="ti-notifications" x-data="tiComponentNotificationBar" class="ti-toast-stack" aria-live="polite" aria-atomic="false">
        <template x-for="n in notifications" x-bind:key="n.id">
            <div class="ti-toast" x-bind:class="n.tone || 'info'" role="alert">
                <div class="ti-toast-bar" aria-hidden="true"></div>
                <div class="ti-toast-icon" aria-hidden="true">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true" x-show="n.tone === 'success'">
                        <path d="M20 6L9 17l-5-5"/>
                    </svg>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true" x-show="n.tone === 'danger'">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true" x-show="n.tone === 'warn'">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                         stroke-linejoin="round" aria-hidden="true" x-show="!n.tone || n.tone === 'info'">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <div class="ti-toast-body">
                    <div class="ti-toast-title" x-text="n.title || ''"></div>
                    <div class="ti-toast-msg" x-text="n.message || ''"></div>
                </div>
                <button class="ti-toast-close" @click="remove(n.id)" aria-label="Dismiss notification" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </template>
    </div>
</div>
