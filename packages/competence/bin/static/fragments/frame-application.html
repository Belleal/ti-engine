<div class="app-shell" x-data="tiAppShell" :class="{ collapsed: collapsed }">
    <nav class="sidebar" aria-label="Main navigation">
        <button class="sidebar-collapse-btn" @click="toggleCollapse()" :aria-label="collapsed ? 'Expand sidebar' : 'Collapse sidebar'" type="button">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                <path d="M6.5 2L3.5 5L6.5 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Brand -->
        <div class="sidebar-brand">
            <div class="sidebar-brand-mark">C</div>
            <div class="sidebar-brand-text-block">
                <span class="sidebar-brand-text">Competence</span> <span class="sidebar-brand-sub" x-text="($store.tiApplication.configuration && $store.tiApplication.configuration.cycle && $store.tiApplication.configuration.cycle.id) || 'Loading...'">Cycle</span>
            </div>
        </div>

        <!-- Main navigation -->
        <div class="sidebar-nav" x-data="{ active: 'dashboard' }">
            <button hx-get="/app/dashboard" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'dashboard'" :class="{ active: active === 'dashboard' }" class="sidebar-item" data-tip="Dashboard" aria-label="Dashboard" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                    </svg>
                </span> <span class="sidebar-item-label">Dashboard</span>
            </button>

            <button hx-get="/app/employees-list" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'employees'" :class="{ active: active === 'employees' }" class="sidebar-item" data-tip="Employees" aria-label="Employees" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </span> <span class="sidebar-item-label">Employees</span>
            </button>

            <button hx-get="/app/competence-evaluation" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'evaluation'" :class="{ active: active === 'evaluation' }" class="sidebar-item" data-tip="My Evaluation" aria-label="My Evaluation" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                </span> <span class="sidebar-item-label">My Evaluation</span>
            </button>

            <button hx-get="/app/manager-calendar" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'calendar'" :class="{ active: active === 'calendar' }" class="sidebar-item" data-tip="Availability" aria-label="My Availability Calendar" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <rect x="3" y="4" width="18" height="18" rx="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </span> <span class="sidebar-item-label">Availability</span>
            </button>

            <button hx-get="/app/interview-schedule" hx-target="#ti-content" hx-swap="innerHTML" hx-push-url="true" @click="active = 'interviews'" :class="{ active: active === 'interviews' }" class="sidebar-item" data-tip="Interviews" aria-label="Interview Schedule" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </span> <span class="sidebar-item-label">Interviews</span>
            </button>
        </div>

        <!-- Quick links section -->
        <div class="sidebar-section-label">Quick links</div>
        <div class="sidebar-nav">
            <button class="sidebar-item" type="button" data-tip="Process Guide" aria-label="Process Guide" disabled>
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                </span> <span class="sidebar-item-label">Process Guide</span>
            </button>
            <button class="sidebar-item" type="button" data-tip="Help" aria-label="Help" disabled>
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                </span> <span class="sidebar-item-label">Help</span>
            </button>
        </div>

        <!-- Footer -->
        <div class="sidebar-foot">
            <button class="sidebar-item" @click="toggleTheme()" data-tip="Toggle theme" aria-label="Toggle theme" type="button">
                <span class="sidebar-item-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                </span> <span class="sidebar-item-label" x-text="theme === 'daylight' ? 'Glass Theme' : 'Daylight Theme'">Toggle Theme</span>
            </button>
        </div>
    </nav>

    <!-- Content -->
    <div class="content" id="ti-content-wrapper">
        <div id="ti-content" class="page-scrollable">
            <ti-nested-frame-placeholder hx-get="/app/dashboard" hx-trigger="load" hx-target="this" hx-swap="outerHTML" hx-push-url="true"/>
        </div>
    </div>

    <!-- Toast notification stack -->
    <div id="ti-notifications" x-data="tiComponentNotificationBar" class="toast-stack" aria-live="polite" aria-atomic="false">
        <template x-for="n in notifications" :key="n.id">
            <div class="toast" :class="n.tone || 'info'" role="alert">
                <div class="toast-icon" aria-hidden="true">
                    <span x-text="n.tone === 'success' ? '✓' : n.tone === 'danger' ? '✕' : n.tone === 'warn' ? '!' : 'i'"></span>
                </div>
                <div class="toast-body">
                    <div class="toast-title" x-text="n.title || ''"></div>
                    <div class="toast-desc" x-text="n.message || ''"></div>
                </div>
                <button class="toast-close" @click="remove(n.id)" aria-label="Dismiss notification" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </template>
    </div>
</div>
