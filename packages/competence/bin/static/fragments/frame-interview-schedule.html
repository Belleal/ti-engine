<title id="ti-page-title" hx-swap-oob="outerHTML">Interviews — Competence</title>
<div id="ti-topbar-info" hx-swap-oob="outerHTML">
    <div class="ti-topbar-title" x-text-label="interface.topbar.interviews">Interviews</div>
</div>
<div class="ti-page" x-data="interviewSchedule()">

    <!-- Interview list panel -->
    <div class="ti-panel competence-panel-mb">
        <div class="ti-panel-head">
            <div class="ti-panel-title" x-text-label="interface.schedule.title"></div>
        </div>

        <template x-if="evaluations.length === 0">
            <div class="ti-empty-state">
                <div class="ti-empty-state-title" x-text-label="interface.schedule.no-evaluations"></div>
            </div>
        </template>

        <template x-if="evaluations.length > 0">
            <div class="competence-interview-panel-body">
                <div class="competence-interview-list-head">
                    <span></span>
                    <span x-text-label="interface.schedule.columns.employee"></span>
                    <span>Status</span>
                    <span x-text-label="interface.schedule.columns.interview-date"></span>
                    <span x-text-label="interface.schedule.columns.actions"></span>
                </div>

                <div class="competence-interview-list">
                    <template x-for="evaluation in evaluations" x-bind:key="evaluation.evaluationID">
                        <div class="competence-interview-row" x-bind:class="{ selected: selectedEvaluationID === evaluation.evaluationID }">
                            <div class="ti-avatar sm" x-bind:class="$store.tiToolbox.generateAvatarClass(evaluation.employeeID || evaluation.evaluationID)"
                                 x-bind:aria-label="evaluation.employeeName">
                                <span x-text="(evaluation.employeeName || '?').charAt(0).toUpperCase()"></span>
                            </div>
                            <div class="competence-interview-emp-name" x-text="evaluation.employeeName"></div>
                            <div>
                                <span class="ti-status-pill info" x-show="!evaluation.interviewDate">
                                    <span class="dot"></span>
                                    Not Scheduled
                                </span>
                                <span class="ti-status-pill success" x-show="!!evaluation.interviewDate">
                                    <span class="dot"></span>
                                    Scheduled
                                </span>
                            </div>
                            <div class="competence-interview-emp-date" x-text="evaluation.interviewDate ? formatDate(evaluation.interviewDate) : '—'"></div>
                            <div class="competence-interview-actions">
                                <button type="button" class="ti-btn sm primary" x-show="!evaluation.interviewDate"
                                        @click="selectEvaluation(evaluation.evaluationID)" x-text-label="interface.schedule.actions.schedule"></button>
                                <button type="button" class="ti-btn sm danger" x-show="!!evaluation.interviewDate && !!evaluation.bookedSlotID"
                                        @click="cancelBooking(evaluation.bookedSlotID)" x-text-label="interface.schedule.actions.cancel-booking"></button>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- Slot picker panel -->
    <div class="ti-panel" x-show="!!selectedEvaluationID">
        <div class="ti-panel-head">
            <div class="ti-panel-title" x-text-label="interface.schedule.pick-slot-title"></div>
            <div class="ti-panel-head-actions">
                <button type="button" class="ti-btn sm ghost" @click="prevSlotWeeks()" x-bind:disabled="!canGoPrevSlotWeeks()"
                        x-text-label="interface.schedule.week-nav-prev"></button>
                <button type="button" class="ti-btn sm ghost" @click="nextSlotWeeks()" x-bind:disabled="!canGoNextSlotWeeks()"
                        x-text-label="interface.schedule.week-nav-next"></button>
            </div>
        </div>

        <template x-if="!hasAvailableSlots()">
            <div class="ti-empty-state">
                <div class="ti-empty-state-title" x-text-label="interface.schedule.no-slots"></div>
                <div class="ti-empty-state-desc">No managers have marked availability for the selected period.</div>
            </div>
        </template>

        <template x-if="hasAvailableSlots()">
            <div class="competence-interview-slot-body">
                <div class="competence-slot-picker-grid">
                    <template x-for="week in getSlotViewWeeks()" x-bind:key="week.weekLabel">
                        <div class="competence-slot-week-col">
                            <div class="competence-slot-week-head" x-text="week.weekLabel"></div>
                            <div class="competence-slot-week-body">
                                <template x-if="week.slots.length === 0">
                                    <div class="competence-slot-empty-week">No slots available</div>
                                </template>
                                <template x-for="slot in week.slots" x-bind:key="slot.slotID">
                                    <button type="button" class="competence-slot-btn" @click="bookSlot(slot.slotID)">
                                        <span class="competence-slot-time" x-text="formatSlotTime(slot)"></span>
                                        <span class="competence-slot-mgr" x-text="slot.managerName || ''"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</div>
