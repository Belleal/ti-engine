<div class="ti-page" x-data="competenceCycleSetup">
    <!-- Page header -->
    <div class="ti-page-head">
        <div class="ti-page-eyebrow" x-text-label="interface.cycle-setup.page-eyebrow"></div>
        <h1 class="ti-page-title">
            <span x-text="cycle.cycleID || ''"></span>
            <span class="competence-cycle-setup-title-sep" x-show="cycle.name"> · </span>
            <span x-text="cycle.name || ''"></span>
        </h1>
        <div class="competence-cycle-setup-subhead">
            <span class="ti-status-pill" x-show="cycle.statusName"
                  x-bind:class="cycle.statusTone || ''"
                  x-text="cycle.statusName || ''"></span>
            <button type="button" class="ti-btn ghost sm" @click="backToCycles()"
                    x-text-label="interface.cycle-setup.back-to-cycles"></button>
        </div>
    </div>

    <!-- Read-only banner -->
    <template x-if="loaded && isReadOnly">
        <div class="competence-cycle-setup-readonly">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <span x-text-label="interface.cycle-setup.read-only-banner"></span>
        </div>
    </template>

    <!-- Two-pane layout -->
    <template x-if="loaded">
        <div class="competence-cycle-setup-shell">

            <!-- Left pane: tree -->
            <div class="ti-content pane competence-cycle-tree-pane">
                <div class="competence-cycle-tree-head" x-text-label="interface.cycle-setup.tree-title"></div>
                <div class="competence-cycle-tree">
                    <template x-for="family in families" x-bind:key="family.code">
                        <div class="competence-cycle-tree-family">
                            <div class="competence-cycle-tree-family-head">
                                <span class="competence-cycle-tree-family-code" x-text="family.code"></span>
                                <span class="competence-cycle-tree-family-name" x-text="family.name"></span>
                            </div>
                            <div class="competence-cycle-tree-spec-list">
                                <button type="button" class="competence-cycle-tree-node"
                                        x-bind:class="(selectedFamily === family.code && selectedKey === 'baseline') ? 'is-selected' : ''"
                                        @click="selectNode(family.code, 'baseline')">
                                    <span class="competence-cycle-tree-node-label" x-text-label="interface.cycle-setup.tree-baseline"></span>
                                    <span class="competence-cycle-tree-node-count"
                                          x-show="getNodeCount(family.code, 'baseline') > 0"
                                          x-text="getNodeCount(family.code, 'baseline')"></span>
                                </button>
                                <template x-for="spec in family.specializations" x-bind:key="spec.code">
                                    <button type="button" class="competence-cycle-tree-node"
                                            x-bind:class="(selectedFamily === family.code && selectedKey === spec.code) ? 'is-selected' : ''"
                                            @click="selectNode(family.code, spec.code)">
                                        <span class="competence-cycle-tree-node-label" x-text="spec.name"></span>
                                        <span class="competence-cycle-tree-node-count"
                                              x-show="getNodeCount(family.code, spec.code) > 0"
                                              x-text="getNodeCount(family.code, spec.code)"></span>
                                        <span class="competence-cycle-tree-status"
                                              x-bind:class="getNodeStatus(family.code, spec.code)"
                                              x-bind:aria-label="getNodeStatusAria(family.code, spec.code)"
                                              x-text="getNodeStatusGlyph(family.code, spec.code)"></span>
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Right pane: editor -->
            <div class="ti-content pane competence-cycle-editor-pane">
                <template x-if="!selectedFamily">
                    <div class="ti-empty-state">
                        <div class="ti-empty-state-icon" aria-hidden="true">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                        <div class="ti-empty-state-title" x-text-label="interface.cycle-setup.no-family-selected-title"></div>
                        <div class="ti-empty-state-desc" x-text-label="interface.cycle-setup.no-family-selected-desc"></div>
                    </div>
                </template>

                <template x-if="selectedFamily">
                    <div class="competence-cycle-editor">

                        <!-- Editor header -->
                        <div class="competence-cycle-editor-head">
                            <div class="competence-cycle-editor-title">
                                <span x-text="getSelectedFamily().name"></span>
                                <span x-show="selectedKey === 'baseline'" x-text-label="interface.cycle-setup.header-baseline-suffix"></span>
                                <span x-show="selectedKey !== 'baseline'" class="competence-cycle-editor-title-sep">·</span>
                                <span x-show="selectedKey !== 'baseline'" x-text="getSelectedSpec().name"></span>
                            </div>
                            <div class="competence-cycle-editor-desc"
                                 x-show="selectedKey === 'baseline'"
                                 x-text-label="interface.cycle-setup.header-description-baseline"></div>
                            <div class="competence-cycle-editor-desc"
                                 x-show="selectedKey !== 'baseline'"
                                 x-text-label="interface.cycle-setup.header-description-spec"></div>
                        </div>

                        <!-- Cap indicator -->
                        <div class="competence-cycle-indicator-row">
                            <div class="competence-cycle-indicator-label" x-text-label="interface.cycle-setup.cap-label"></div>
                            <div class="competence-cycle-indicator-content">
                                <div class="competence-cap-indicator" x-bind:class="isOverCap() ? 'over' : ''">
                                    <div class="competence-cap-bar">
                                        <div class="competence-cap-bar-fill" x-bind:style="capBarStyle()"></div>
                                    </div>
                                    <div class="competence-cap-text" x-text="getCapText()"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Floor coverage pills (baseline only) -->
                        <template x-if="selectedKey === 'baseline'">
                            <div class="competence-cycle-indicator-row">
                                <div class="competence-cycle-indicator-label" x-text-label="interface.cycle-setup.floor-coverage-label"></div>
                                <div class="competence-cycle-indicator-content">
                                    <div class="competence-floor-pills">
                                        <template x-for="sub in subcategories" x-bind:key="sub.code">
                                            <span class="competence-floor-pill"
                                                  x-bind:class="isSubcategoryCovered(sub.code) ? 'satisfied' : 'missing'"
                                                  x-bind:aria-label="getFloorPillAria(sub.code)"
                                                  x-bind:title="sub.name + (isSubcategoryCovered(sub.code) ? '' : ' — missing')">
                                                <span x-text="sub.code"></span>
                                            </span>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>

                        <!-- "No extras" checkbox (specialization only) -->
                        <template x-if="selectedKey !== 'baseline'">
                            <div class="competence-cycle-no-extras">
                                <label class="competence-cycle-no-extras-label">
                                    <input type="checkbox" x-model="draft.markedEmpty"
                                           x-bind:disabled="isReadOnly || draft.codes.length > 0"
                                           @change="onMarkedEmptyChange()"/>
                                    <span x-text-label="interface.cycle-setup.no-extras-label"></span>
                                </label>
                                <div class="competence-cycle-no-extras-desc" x-text-label="interface.cycle-setup.no-extras-desc"></div>
                            </div>
                        </template>

                        <!-- Competency list -->
                        <div class="competence-cycle-codes">
                            <template x-if="draft.codes.length === 0">
                                <div class="competence-cycle-codes-empty">
                                    <span x-show="selectedKey === 'baseline'" x-text-label="interface.cycle-setup.competencies-empty-baseline"></span>
                                    <span x-show="selectedKey !== 'baseline'" x-text-label="interface.cycle-setup.competencies-empty-spec"></span>
                                </div>
                            </template>
                            <template x-for="code in draft.codes" x-bind:key="code">
                                <div class="competence-cycle-code-row">
                                    <span class="ti-tag mono" x-text="code"></span>
                                    <div class="competence-cycle-code-meta">
                                        <div class="competence-cycle-code-name" x-text="getCompetencyName(code)"></div>
                                        <div class="competence-cycle-code-sub">
                                            <span class="ti-tag" x-text="getCompetencySubcategory(code)"></span>
                                            <template x-for="(mapping, mIdx) in getCompetencyECF(code)" x-bind:key="mIdx">
                                                <span class="ti-tag mono competence-cycle-code-ecf">
                                                    <span x-text-label="interface.cycle-setup.ecf-prefix"></span>:
                                                    <span x-text="mapping.competence + ' (' + mapping.level + ')'"></span>
                                                </span>
                                            </template>
                                        </div>
                                    </div>
                                    <button type="button" class="ti-btn ghost icon competence-cycle-code-remove"
                                            x-show="!isReadOnly"
                                            @click="removeCode(code)"
                                            x-bind:aria-label="getRemoveAria(code)">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                             stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                            <path d="M18 6L6 18M6 6l12 12"/>
                                        </svg>
                                    </button>
                                </div>
                            </template>
                        </div>

                        <!-- Action bar -->
                        <div class="competence-cycle-editor-actions" x-show="!isReadOnly">
                            <button type="button" class="ti-btn primary" @click="openPicker()">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                     stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>
                                <span x-text-label="interface.cycle-setup.add-btn"></span>
                            </button>
                            <button type="button" class="ti-btn" @click="openCloneModal()" x-text-label="interface.cycle-setup.clone-btn"></button>
                            <div class="competence-cycle-editor-actions-spacer"></div>
                            <div class="competence-cycle-editor-state"
                                 x-bind:class="isDirty() ? 'unsaved' : 'saved'"
                                 x-text="isDirty() ? getLabel('interface.cycle-setup.unsaved-state') : getLabel('interface.cycle-setup.saved-state')"></div>
                            <button type="button" class="ti-btn primary" @click="saveDraft()"
                                    x-bind:disabled="!isDirty() || saving"
                                    x-text-label="interface.cycle-setup.save-btn"></button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- =============================================================
         Competency picker modal
         ============================================================= -->
    <template x-if="modal.kind === 'picker'">
        <div class="ti-modal-backdrop" @click.self="closeModal()" @keydown.escape.window="closeModal()">
            <div class="ti-modal large" role="dialog" aria-modal="true">
                <div class="ti-modal-head">
                    <div class="ti-modal-title" x-text-label="interface.cycle-setup.picker.title"></div>
                    <button type="button" class="ti-modal-close" @click="closeModal()" aria-label="Close">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="ti-modal-body">
                    <div class="competence-cycle-picker-filters">
                        <input type="text" class="ti-input competence-cycle-picker-search"
                               x-model="modal.payload.query"
                               x-bind:placeholder="getLabel('interface.cycle-setup.picker.search-placeholder')"/>
                        <select class="ti-select" x-model="modal.payload.category">
                            <option value="" x-text-label="interface.cycle-setup.picker.category-all"></option>
                            <template x-for="cat in categoryOptions()" x-bind:key="cat.code">
                                <option x-bind:value="cat.code" x-text="cat.name"></option>
                            </template>
                        </select>
                        <select class="ti-select" x-model="modal.payload.subcategory">
                            <option value="" x-text-label="interface.cycle-setup.picker.subcategory-all"></option>
                            <template x-for="sub in subcategoryOptionsForCategory(modal.payload.category)" x-bind:key="sub.code">
                                <option x-bind:value="sub.code" x-text="sub.code + ' · ' + sub.name"></option>
                            </template>
                        </select>
                    </div>
                    <div class="competence-cycle-picker-list">
                        <template x-if="pickerFilteredCompetencies().length === 0">
                            <div class="competence-cycle-picker-empty" x-text-label="interface.cycle-setup.picker.no-results"></div>
                        </template>
                        <template x-for="competency in pickerFilteredCompetencies()" x-bind:key="competency.code">
                            <label class="competence-cycle-picker-row"
                                   x-bind:class="(modal.payload.selected[competency.code] ? 'is-selected' : '') + (isCodeInDraft(competency.code) ? ' is-disabled' : '')">
                                <input type="checkbox"
                                       x-bind:checked="modal.payload.selected[competency.code] === true"
                                       x-bind:disabled="isCodeInDraft(competency.code)"
                                       @change="togglePickerSelection(competency.code)"/>
                                <div class="competence-cycle-picker-row-meta">
                                    <div class="competence-cycle-picker-row-top">
                                        <span class="ti-tag mono" x-text="competency.code"></span>
                                        <span class="ti-tag" x-text="competency.subcategoryName"></span>
                                        <span x-show="isCodeInDraft(competency.code)"
                                              class="ti-tag muted competence-cycle-picker-added"
                                              x-text-label="interface.cycle-setup.picker.already-added"></span>
                                    </div>
                                    <div class="competence-cycle-picker-row-name" x-text="competency.name"></div>
                                </div>
                            </label>
                        </template>
                    </div>
                </div>
                <div class="ti-modal-foot">
                    <button type="button" class="ti-btn ghost" @click="closeModal()" x-text-label="interface.cycle-setup.picker.cancel-btn"></button>
                    <button type="button" class="ti-btn primary" @click="confirmPicker()"
                            x-bind:disabled="pickerSelectedCount() === 0"
                            x-text="getPickerConfirmLabel()"></button>
                </div>
            </div>
        </div>
    </template>

    <!-- =============================================================
         Clone modal
         ============================================================= -->
    <template x-if="modal.kind === 'clone'">
        <div class="ti-modal-backdrop" @click.self="closeModal()" @keydown.escape.window="closeModal()">
            <div class="ti-modal medium" role="dialog" aria-modal="true">
                <div class="ti-modal-head">
                    <div class="ti-modal-title" x-text-label="interface.cycle-setup.clone-modal.title"></div>
                    <button type="button" class="ti-modal-close" @click="closeModal()" aria-label="Close">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M18 6L6 18M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="ti-modal-body">
                    <div class="competence-cycle-clone-section">
                        <div class="ti-field-label" x-text-label="interface.cycle-setup.clone-modal.source-label"></div>
                        <label class="competence-cycle-clone-radio">
                            <input type="radio" name="clone-source" value="prev-cycle" x-model="modal.payload.source"/>
                            <span x-text-label="interface.cycle-setup.clone-modal.source-prev-cycle"></span>
                        </label>
                        <label class="competence-cycle-clone-radio">
                            <input type="radio" name="clone-source" value="other" x-model="modal.payload.source"/>
                            <span x-text-label="interface.cycle-setup.clone-modal.source-other"></span>
                        </label>
                    </div>

                    <template x-if="modal.payload.source === 'prev-cycle'">
                        <div class="competence-cycle-clone-section">
                            <template x-if="!modal.payload.prevCycleID">
                                <div class="competence-cycle-clone-empty" x-text-label="interface.cycle-setup.clone-modal.prev-empty"></div>
                            </template>
                            <template x-if="modal.payload.prevCycleID">
                                <div class="competence-cycle-clone-preview">
                                    <span class="ti-tag mono" x-text="modal.payload.prevCycleID"></span>
                                    <span class="competence-cycle-clone-count" x-text="formatCount(modal.payload.prevCodes.length)"></span>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template x-if="modal.payload.source === 'other'">
                        <div class="competence-cycle-clone-section">
                            <div class="ti-form-grid">
                                <div>
                                    <label class="ti-field-label" x-text-label="interface.cycle-setup.clone-modal.source-family-label"></label>
                                    <select class="ti-select" x-model="modal.payload.otherFamily" @change="onCloneFamilyChange()">
                                        <option value=""></option>
                                        <template x-for="family in families" x-bind:key="family.code">
                                            <option x-bind:value="family.code" x-text="family.code + ' · ' + family.name"></option>
                                        </template>
                                    </select>
                                </div>
                                <div>
                                    <label class="ti-field-label" x-text-label="interface.cycle-setup.clone-modal.source-key-label"></label>
                                    <select class="ti-select" x-model="modal.payload.otherKey">
                                        <option value=""></option>
                                        <option value="baseline" x-text-label="interface.cycle-setup.tree-baseline"></option>
                                        <template x-for="spec in otherFamilySpecs()" x-bind:key="spec.code">
                                            <option x-bind:value="spec.code" x-text="spec.name"></option>
                                        </template>
                                    </select>
                                </div>
                            </div>
                            <div class="competence-cycle-clone-preview" x-show="modal.payload.otherFamily && modal.payload.otherKey">
                                <span class="competence-cycle-clone-count" x-text="formatCount(otherSourceCodes().length)"></span>
                            </div>
                        </div>
                    </template>

                    <div class="competence-cycle-clone-warning" x-show="draft.codes.length > 0"
                         x-text-label="interface.cycle-setup.clone-modal.replace-warning"></div>
                </div>
                <div class="ti-modal-foot">
                    <button type="button" class="ti-btn ghost" @click="closeModal()" x-text-label="interface.cycle-setup.clone-modal.cancel-btn"></button>
                    <button type="button" class="ti-btn primary" @click="confirmClone()"
                            x-bind:disabled="!canCloneConfirm()"
                            x-text-label="interface.cycle-setup.clone-modal.confirm-btn"></button>
                </div>
            </div>
        </div>
    </template>
</div>
