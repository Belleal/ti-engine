<div class="ti-page" x-data="insightsTeam">

    <div class="ti-page-head competence-insights-head">
        <div>
            <div class="ti-page-eyebrow" x-text-label="interface.insights.eyebrow">Insights</div>
            <h1 class="ti-page-title" x-text-label="interface.insights.team.title">Team analytics</h1>
            <p class="ti-page-subtitle" x-text="getCycleSubtitle()"></p>
        </div>
        <label class="competence-insights-picker">
            <span x-text-label="interface.insights.cycle.select-label">Cycle</span>
            <select class="ti-select" x-bind:value="selectedCycleID" @change="onCycleChange($event)">
                <template x-for="c in cycles" x-bind:key="c.id">
                    <option x-bind:value="c.id" x-text="c.name"></option>
                </template>
            </select>
        </label>
    </div>

    <!-- Loading -->
    <template x-if="isLoading">
        <div class="ti-panel">
            <div class="ti-empty-state">
                <div class="ti-empty-state-title" x-text-label="interface.insights.cycle.loading">Loading…</div>
            </div>
        </div>
    </template>

    <!-- No cycle -->
    <template x-if="!isLoading && !cycle">
        <div class="ti-panel">
            <div class="ti-empty-state">
                <div class="ti-empty-state-icon" aria-hidden="true"><span class="ti-icon bar-chart xl"></span></div>
                <div class="ti-empty-state-title" x-text-label="interface.insights.cycle.empty">No data for this cycle.</div>
                <div class="ti-empty-state-desc" x-text-label="interface.insights.cycle.empty-desc"></div>
            </div>
        </div>
    </template>

    <!-- Reports (scoped to the requesting user's subtree) -->
    <template x-if="!isLoading && cycle">
        <div class="ti-card-grid">

            <div class="ti-card-wide" x-show="isLive()">
                <span class="ti-status-pill warn"><span class="dot"></span><span x-text="getCaveatBanner()"></span></span>
            </div>

            <!-- Team coverage -->
            <section class="ti-panel competence-panel-body">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.coverage-overall">Overall coverage</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.coverage.whatItShows"></p>
                <figure class="ti-chart" x-ti-chart="coverageGaugeSpec" role="img" x-bind:aria-label="getGaugeAriaLabel()"></figure>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.coverage.methodology"></p>
                </details>
            </section>

            <section class="ti-panel competence-panel-body">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.coverage-by-group">By group</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.coverage-by-group-desc"></p>
                <figure class="ti-chart" x-ti-chart="coverageBarsSpec" role="img" x-bind:aria-label="getBarsAriaLabel()"></figure>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.coverage.methodology"></p>
                </details>
            </section>

            <section class="ti-panel competence-panel-body ti-card-wide">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.pending">Pending</div>
                </div>
                <div class="ti-data-grid">
                    <template x-for="row in pendingRows()" x-bind:key="row.employeeID">
                        <div class="ti-data-grid-row">
                            <span class="ti-data-grid-cell" x-text="row.name"></span>
                            <span class="ti-data-grid-cell" x-text="row.groupLabel"></span>
                            <span class="ti-status-pill" x-bind:class="pendingTone(row.status)"><span class="dot"></span><span x-text="row.status"></span></span>
                        </div>
                    </template>
                </div>
            </section>

            <!-- Grader Calibration (team-only) -->
            <section class="ti-panel competence-panel-body ti-card-wide">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.reports.calibration.title">Grader calibration</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.calibration.whatItShows"></p>
                <template x-if="hasCalibration()">
                    <div>
                        <figure class="ti-chart" x-ti-chart="calibrationKpiSpec" role="img" x-bind:aria-label="getCalibrationKpiAriaLabel()"></figure>
                        <figure class="ti-chart" x-ti-chart="calibrationSpec" role="img" x-bind:aria-label="getCalibrationAriaLabel()"></figure>
                        <div class="ti-data-grid">
                            <div class="ti-data-grid-row">
                                <span class="ti-data-grid-cell ti-kv-label" x-text-label="interface.insights.cycle.reports.calibration.col-competency">Competency</span>
                                <span class="ti-data-grid-cell ti-kv-label" x-text-label="interface.insights.cycle.reports.calibration.kpi-self">vs self</span>
                                <span class="ti-data-grid-cell ti-kv-label" x-text-label="interface.insights.cycle.reports.calibration.kpi-team">vs team</span>
                            </div>
                            <template x-for="row in calibrationDrillRows()" x-bind:key="row.code">
                                <div class="ti-data-grid-row">
                                    <span class="ti-data-grid-cell" x-text="row.code"></span>
                                    <span class="ti-data-grid-cell tabular-nums" x-text="formatGap(row.vsSelf)"></span>
                                    <span class="ti-data-grid-cell tabular-nums" x-text="formatGap(row.vsTeam)"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
                <template x-if="!hasCalibration()">
                    <div class="ti-empty-state"><div class="ti-empty-state-title" x-text-label="interface.insights.cycle.insufficient-data">Not enough reported evaluations yet.</div></div>
                </template>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.calibration.methodology"></p>
                </details>
            </section>

            <!-- R5 Level distribution -->
            <section class="ti-panel competence-panel-body ti-card-wide">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.reports.levelDistribution.title">Score distribution by level</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.levelDistribution.whatItShows"></p>
                <template x-if="hasLevelDistribution()">
                    <figure class="ti-chart" x-ti-chart="levelDistributionSpec" role="img" x-bind:aria-label="getLevelDistributionAriaLabel()"></figure>
                </template>
                <template x-if="!hasLevelDistribution()">
                    <div class="ti-empty-state"><div class="ti-empty-state-title" x-text-label="interface.insights.cycle.empty">No data.</div></div>
                </template>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.levelDistribution.methodology"></p>
                </details>
            </section>

            <!-- R4 Competence heatmap -->
            <section class="ti-panel competence-panel-body ti-card-wide">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.reports.heatmap.title">Competence heatmap</div>
                    <div class="ti-panel-head-actions">
                        <select class="ti-select" x-bind:value="heatmapView" x-bind:aria-label="getLabel('interface.insights.team.heatmap-view-label')" @change="onHeatmapViewChange($event)">
                            <option value="value" x-text-label="interface.insights.cycle.heatmap-view-value">Value</option>
                            <option value="gap" x-text-label="interface.insights.cycle.heatmap-view-gap">Gap vs expected</option>
                        </select>
                    </div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.heatmap.whatItShows"></p>
                <template x-if="hasHeatmap()">
                    <figure class="ti-chart" x-ti-chart="heatmapSpec" role="img" x-bind:aria-label="getHeatmapAriaLabel()"></figure>
                </template>
                <template x-if="!hasHeatmap()">
                    <div class="ti-empty-state"><div class="ti-empty-state-title" x-text-label="interface.insights.cycle.empty">No data.</div></div>
                </template>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.heatmap.methodology"></p>
                </details>
            </section>

            <!-- R3 Alignment quadrant -->
            <section class="ti-panel competence-panel-body">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.reports.alignment.title">Self vs manager alignment</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.alignment.whatItShows"></p>
                <template x-if="hasAlignment()">
                    <figure class="ti-chart" x-ti-chart="alignmentSpec" role="img" x-bind:aria-label="getAlignmentAriaLabel()"></figure>
                </template>
                <template x-if="!hasAlignment()">
                    <div class="ti-empty-state"><div class="ti-empty-state-title" x-text-label="interface.insights.cycle.empty">No data.</div></div>
                </template>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.alignment.methodology"></p>
                </details>
            </section>

            <!-- R2 Interview timing -->
            <section class="ti-panel competence-panel-body">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.reports.timeDistribution.title">Interview timing</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.timeDistribution.whatItShows"></p>
                <p class="ti-kv-value"><span x-text-label="interface.insights.cycle.unscheduled-ready">Ready, no interview booked</span>: <span class="tabular-nums" x-text="unscheduledReady"></span></p>
                <template x-if="hasTimeDistribution()">
                    <figure class="ti-chart" x-ti-chart="timeDistributionSpec" role="img" x-bind:aria-label="getTimeDistributionAriaLabel()"></figure>
                </template>
                <template x-if="!hasTimeDistribution()">
                    <div class="ti-empty-state"><div class="ti-empty-state-title" x-text-label="interface.insights.cycle.empty">No data.</div></div>
                </template>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.timeDistribution.methodology"></p>
                </details>
            </section>

            <!-- R6 Predictive drivers -->
            <section class="ti-panel competence-panel-body ti-card-wide">
                <div class="ti-panel-head">
                    <div class="ti-panel-title" x-text-label="interface.insights.cycle.reports.predictiveDrivers.title">Performance drivers</div>
                </div>
                <p class="ti-panel-body-intro" x-text-label="interface.insights.cycle.reports.predictiveDrivers.whatItShows"></p>
                <template x-if="hasPredictiveDrivers()">
                    <figure class="ti-chart" x-ti-chart="predictiveDriversSpec" role="img" x-bind:aria-label="getPredictiveDriversAriaLabel()"></figure>
                </template>
                <template x-if="!hasPredictiveDrivers()">
                    <div class="ti-empty-state"><div class="ti-empty-state-title" x-text-label="interface.insights.cycle.insufficient-data">Not enough reported evaluations yet.</div></div>
                </template>
                <details class="ti-card-note">
                    <summary x-text-label="interface.insights.cycle.methodology-toggle">How it's calculated</summary>
                    <p x-text-label="interface.insights.cycle.reports.predictiveDrivers.methodology"></p>
                </details>
            </section>

        </div>
    </template>
</div>
