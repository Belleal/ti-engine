<title id="ti-page-title" hx-swap-oob="outerHTML">Availability — Competence</title>
<div id="ti-topbar-info" hx-swap-oob="outerHTML">
    <div class="ti-topbar-title" x-text-label="interface.topbar.calendar">Availability</div>
</div>
<div class="ti-page" x-data="managerCalendar()">

    <!-- Help banner -->
    <div class="competence-cal-help-card">
        <div class="competence-cal-help-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="10"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </div>
        <div>
            <div class="competence-cal-help-title" x-text-label="interface.calendar.title"></div>
            <div class="competence-cal-help-msg">Click any empty slot to mark your availability. Booked slots cannot be changed.</div>
        </div>
    </div>

    <!-- Calendar toolbar -->
    <div class="competence-calendar-toolbar">
        <button type="button" class="ti-btn sm ghost" @click="prevWeek()" x-bind:disabled="!canGoPrev()" x-text-label="interface.calendar.week-nav-prev"></button>
        <div class="competence-calendar-week-label" x-text="getWeekLabel()"></div>
        <button type="button" class="ti-btn sm ghost" @click="nextWeek()" x-bind:disabled="!canGoNext()" x-text-label="interface.calendar.week-nav-next"></button>
    </div>

    <!-- Calendar grid -->
    <div class="competence-calendar-grid">
        <div class="competence-calendar-table">
            <!-- Header row -->
            <div class="competence-cal-header-row">
                <div class="competence-cal-corner"></div>
                <template x-for="day in getWeekDays()" x-bind:key="'header-' + day.date">
                    <div class="competence-cal-header-cell">
                        <div class="competence-cal-header-day" x-text="day.dayLabel"></div>
                        <div class="competence-cal-header-date" x-text="day.dateLabel"></div>
                    </div>
                </template>
            </div>

            <!-- Time slot rows -->
            <template x-for="slot in getTimeSlots()" x-bind:key="slot.startTime">
                <div class="competence-cal-row">
                    <div class="competence-cal-time-cell" x-text="slot.startTime"></div>
                    <template x-for="day in getWeekDays()" x-bind:key="day.date + '-' + slot.startTime">
                        <div class="competence-cal-slot" x-bind:class="getSlotCssClass(day.date, slot.startTime)" @click="handleSlotClick(day.date, slot.startTime)">
                            <div class="competence-cal-slot-split">
                                <button type="button" class="competence-cal-slot-split-half competence-available" @click.stop="toggleSlot(day.date, slot.startTime, 'available')"
                                        x-bind:title="getLabel('interface.calendar.mark-available')">✓
                                </button>
                                <button type="button" class="competence-cal-slot-split-half competence-busy" @click.stop="toggleSlot(day.date, slot.startTime, 'busy')"
                                        x-bind:title="getLabel('interface.calendar.mark-busy')">✕
                                </button>
                            </div>
                            <span class="competence-calendar-slot-label" x-text="getSlotBookingLabel(day.date, slot.startTime)"></span>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <!-- Legend -->
    <div class="competence-cal-legend">
        <div class="competence-cal-legend-item">
            <div class="competence-cal-legend-swatch competence-available"></div>
            <span x-text-label="interface.calendar.slot-available"></span>
        </div>
        <div class="competence-cal-legend-item">
            <div class="competence-cal-legend-swatch competence-booked"></div>
            <span x-text-label="interface.calendar.slot-booked"></span>
        </div>
        <div class="competence-cal-legend-item">
            <div class="competence-cal-legend-swatch competence-busy"></div>
            <span x-text-label="interface.calendar.slot-busy"></span>
        </div>
        <div class="competence-cal-legend-item">
            <div class="competence-cal-legend-swatch empty"></div>
            <span x-text-label="interface.calendar.slot-empty"></span>
        </div>
    </div>
</div>
