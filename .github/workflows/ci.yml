name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ current, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # No npm cache: it keys off package-lock.json, which is gitignored in this repo.
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npx eslint .
      - name: Unit tests
        run: npm test --workspaces --if-present
      - name: JSON config validation
        run: npm run test:json -w @ti-engine/competence

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/competence/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
